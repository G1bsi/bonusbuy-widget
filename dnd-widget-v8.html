<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>DnD OBS Widget</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@600&display=swap');
    @font-face {
      font-family: 'PF Adamant Sans Pro';
      src: url('https://fonts-online.ru/fonts/pf-adamant-sans-pro/pfadamantsanspro-bold.woff2') format('woff2'),
           url('https://fonts-online.ru/fonts/pf-adamant-sans-pro/pfadamantsanspro-bold.woff') format('woff');
      font-weight: 700;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      width:1920px; height:1080px; overflow:hidden;
      background:transparent;
      font-family:'Inter','Arial',sans-serif; font-weight:600;
      user-select:none;
    }
    #widget-root { width:1920px; height:1080px; position:relative; border-radius:24px; overflow:visible; opacity:0; pointer-events:none; transition:opacity 0.8s ease; }
    #bg {
      position:absolute; inset:0; width:1920px; height:1080px;
      background-size:1920px 1080px; background-repeat:no-repeat;
    }

    /* ── Case layers ── */
    .case-layer {
      position:absolute; inset:0; width:1920px; height:1080px;
      background-size:1920px 1080px; background-repeat:no-repeat;
      transition:opacity 0.85s ease; pointer-events:none;
      animation:caseGlow 3s ease-in-out infinite;
    }
    .case-layer.opened { opacity:0; animation:none; }
    @keyframes caseGlow {
      0%,100%{filter:drop-shadow(0 0 3px rgba(255,200,60,0.18));}
      50%{filter:drop-shadow(0 0 7px rgba(255,220,80,0.32));}
    }

    /* ── Podium layers ── */
    .podium-layer {
      position:absolute; inset:0; width:1920px; height:1080px;
      background-size:1920px 1080px; background-repeat:no-repeat;
      opacity:0; transition:opacity 0.8s ease; pointer-events:none; z-index:30;
    }
    .podium-layer.visible { opacity:1; animation:podiumGlow 2.5s ease-in-out infinite; }
    @keyframes podiumGlow {
      0%,100%{filter:drop-shadow(0 0 8px rgba(160,80,255,0.35));}
      50%{filter:drop-shadow(0 0 16px rgba(180,100,255,0.55));}
    }

    /* ── Podium OPENED layers (shown when reveal pressed) ── */
    .podium-open-layer {
      position:absolute; inset:0; width:1920px; height:1080px;
      background-size:1920px 1080px; background-repeat:no-repeat;
      opacity:0; transition:opacity 0.7s ease; pointer-events:none; z-index:31;
    }
    .podium-open-layer.visible { opacity:1; }

    /* ── Instruction text — Inter, white+stroke ── */
    #instruction-text {
      position:absolute; top:20px; left:50%; transform:translateX(-50%);
      color:#ffffff;
      font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:52px; letter-spacing:-1px;
      text-transform:uppercase; white-space:nowrap;
      z-index:50; text-align:center; width:1300px;
      -webkit-text-stroke:2px rgba(0,0,0,0.95); paint-order:stroke fill;
      text-shadow:3px 3px 0 rgba(0,0,0,0.95),-1px -1px 0 rgba(0,0,0,0.95),1px -1px 0 rgba(0,0,0,0.95),-1px 1px 0 rgba(0,0,0,0.95);
      transition:color 0.4s;
    }
    #instruction-text.attention { color:#ffe84d; animation:textBlink 1.4s infinite; }
    @keyframes textBlink{0%,100%{opacity:1}50%{opacity:0.5}}

    /* ── Value slots ── */
    .value-slot {
      position:absolute; width:280px; height:105px;
      display:flex; align-items:center; justify-content:center;
      z-index:20; overflow:hidden;
      transition:transform 0.65s cubic-bezier(0.4,0,0.8,0.6);
    }
    .value-slot::before {
      content:''; position:absolute; inset:0;
      background-image:var(--рамка-url);
      background-size:1262px 1123px; background-position:-490px -517px;
      background-repeat:no-repeat;
    }
    .value-slot .val-text {
      position:relative; z-index:2; color:#e8d090;
      font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:50px; letter-spacing:-1px;
      text-shadow:1px 1px 3px rgba(0,0,0,0.9);
      text-align:center; width:100%; line-height:1;
    }
    .value-slot.left-slot.eliminated  { transform:translateX(-310px); }
    .value-slot.right-slot.eliminated { transform:translateX(310px); }
    .value-slot.last-remaining .val-text {
      color:#fff; text-shadow:0 0 10px #fff,0 0 22px rgba(255,255,255,0.4);
      animation:valGlow 1s infinite;
    }
    @keyframes valGlow{0%,100%{opacity:1}50%{opacity:0.5}}

    .slot-left-1{left:0;top:110px;} .slot-left-2{left:0;top:218px;}
    .slot-left-3{left:0;top:326px;} .slot-left-4{left:0;top:434px;}
    .slot-left-5{left:0;top:542px;} .slot-left-6{left:0;top:650px;}
    .slot-left-7{left:0;top:758px;} .slot-left-8{left:0;top:866px;}
    .slot-right-1{right:0;top:110px;} .slot-right-2{right:0;top:218px;}
    .slot-right-3{right:0;top:326px;} .slot-right-4{right:0;top:434px;}
    .slot-right-5{right:0;top:542px;} .slot-right-6{right:0;top:650px;}
    .slot-right-7{right:0;top:758px;} .slot-right-8{right:0;top:866px;}

    /* ── Banker popup ── */
    #banker-popup {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0);
      background:linear-gradient(135deg,#08000f,#160024,#08000f);
      border:4px solid #cc00ff; padding:30px 80px 40px;
      border-radius:22px; text-align:center;
      transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
      z-index:100; opacity:0;
      box-shadow:0 0 80px rgba(180,0,255,0.55); min-width:700px;
    }
    #banker-popup.visible{transform:translate(-50%,-50%) scale(1);opacity:1;}
    #banker-banner-img{width:100%;max-height:130px;object-fit:contain;display:none;margin-bottom:8px;}
    #banker-banner-img.loaded{display:block;}
    #banker-popup h1{
      color:#e0aaff; font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:58px; letter-spacing:-1px; margin-bottom:8px;
      text-shadow:0 0 10px rgba(200,100,255,0.4); text-transform:uppercase;
    }
    #banker-offer-amount{
      color:#00ffcc; font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:120px; letter-spacing:-2px;
      text-shadow:0 0 20px rgba(0,255,200,0.5); line-height:1;
    }
    #banker-hint{
      display:flex; align-items:center; justify-content:center;
      gap:20px; margin-top:16px;
      font-family:'Inter','Arial',sans-serif; font-size:32px; font-weight:600;
    }
    .hint-deal{color:#4eff91;} .hint-sep{color:#888;font-size:24px;font-weight:400;} .hint-nodeal{color:#ff6b6b;}

    /* ── Deal taken — win fades in center, no overlay ── */
    #deal-win-popup {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%);
      text-align:center; z-index:200;
      opacity:0; pointer-events:none;
      transition:opacity 1.0s ease;
    }
    #deal-win-popup.visible{opacity:1;}
    #deal-win-label{
      color:#fff; font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:52px; letter-spacing:-1px; text-transform:uppercase;
      -webkit-text-stroke:2px rgba(0,0,0,0.95); paint-order:stroke fill;
      text-shadow:3px 3px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000;
      margin-bottom:10px;
    }
    #deal-win-amount{
      font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:160px; letter-spacing:-3px;
      background:linear-gradient(180deg,#fff 0%,#ffd700 60%,#c8a030 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      line-height:1; filter:drop-shadow(0 4px 20px rgba(255,215,0,0.5));
    }

    /* ── Deal taken — bottom strip showing player case value ── */
    #deal-info-strip {
      position:absolute; bottom:0; left:0; right:0;
      transform:translateY(100%);
      background:linear-gradient(90deg,rgba(6,0,25,0.92),rgba(30,0,70,0.95),rgba(6,0,25,0.92));
      border-top:3px solid #7744ee; padding:18px 320px;
      text-align:center; z-index:201;
      box-shadow:0 -4px 40px rgba(90,40,220,0.5); opacity:0;
      transition:transform 0.65s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.5s ease;
      pointer-events:none;
    }
    #deal-info-strip.visible{transform:translateY(0);opacity:1;}
    #deal-info-strip .strip-text{
      color:#e8e0ff; font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:30px; letter-spacing:-0.5px;
      text-shadow:1px 1px 3px rgba(0,0,0,0.95);
    }
    #deal-info-strip .strip-hl{color:#ffe066;}

    /* ── Final bottom strip ── */
    #final-banner {
      position:absolute; bottom:0; left:0; right:0;
      transform:translateY(100%);
      background:linear-gradient(90deg,rgba(6,0,25,0.92),rgba(30,0,70,0.95),rgba(6,0,25,0.92));
      border-top:3px solid #7744ee; padding:18px 320px;
      text-align:center; z-index:80;
      box-shadow:0 -4px 40px rgba(90,40,220,0.5); opacity:0;
      transition:transform 0.65s cubic-bezier(0.175,0.885,0.32,1.275),opacity 0.5s ease;
      pointer-events:none;
    }
    #final-banner.visible{transform:translateY(0);opacity:1;}
    #final-banner .final-body{
      color:#e8e0ff; font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:28px; letter-spacing:-0.5px; line-height:1.4;
      text-shadow:1px 1px 3px rgba(0,0,0,0.95);
    }
    #final-banner .hl{color:#ffe066;}

    /* ── Final choice buttons — pulsing ── */
    #final-buttons {
      position:absolute; top:50%; left:50%;
      transform:translate(-50%,-50%) scale(0);
      display:flex; gap:40px; z-index:90; opacity:0;
      transition:all 0.5s cubic-bezier(0.175,0.885,0.32,1.275);
      pointer-events:none;
    }
    #final-buttons.visible{transform:translate(-50%,-50%) scale(1);opacity:1;pointer-events:all;}
    .choice-btn{
      font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:52px; letter-spacing:-1px;
      padding:28px 70px; border:none; border-radius:18px;
      cursor:pointer; text-transform:uppercase;
      transition:transform 0.15s,box-shadow 0.15s;
    }
    .choice-btn:hover{transform:scale(1.06);}
    .choice-btn:active{transform:scale(0.97);}
    #btn-keep{
      background:linear-gradient(180deg,#2ecc71,#1a8a4a); color:#fff;
      box-shadow:0 6px 30px rgba(46,204,113,0.5),0 0 60px rgba(46,204,113,0.2);
      animation:btnPulseGreen 2.5s ease-in-out infinite;
    }
    #btn-swap{
      background:linear-gradient(180deg,#e74c3c,#a01f14); color:#fff;
      box-shadow:0 6px 30px rgba(231,76,60,0.5),0 0 60px rgba(231,76,60,0.2);
      animation:btnPulseRed 2.5s ease-in-out infinite;
    }
    @keyframes btnPulseGreen{
      0%,100%{box-shadow:0 6px 30px rgba(46,204,113,0.5),0 0 60px rgba(46,204,113,0.2);}
      50%{box-shadow:0 6px 50px rgba(46,204,113,0.8),0 0 90px rgba(46,204,113,0.45);}
    }
    @keyframes btnPulseRed{
      0%,100%{box-shadow:0 6px 30px rgba(231,76,60,0.5),0 0 60px rgba(231,76,60,0.2);}
      50%{box-shadow:0 6px 50px rgba(231,76,60,0.8),0 0 90px rgba(231,76,60,0.45);}
    }

    /* ── Win reveal — scale+rise from point 960,720 ── */
    #win-popup {
      position:absolute;
      /* Origin point: 960x720 (center of podium) */
      left:960px; top:720px;
      transform:translate(-50%,-50%) scale(0);
      transform-origin:center center;
      display:flex; flex-direction:column; align-items:center;
      z-index:9999; opacity:0; pointer-events:none;
      transition:transform 0.9s cubic-bezier(0.175,0.885,0.32,1.275),
                 opacity 0.5s ease,
                 top 0.9s cubic-bezier(0.175,0.885,0.32,1.275);
    }
    #win-popup.visible{
      transform:translate(-50%,-50%) scale(1);
      top:480px; /* rises to vertical center ~480px from top */
      opacity:1; pointer-events:all;
    }
    #win-label{
      color:#ffe066; font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:52px; letter-spacing:-1px; text-transform:uppercase;
      text-shadow:0 2px 12px rgba(0,0,0,0.6), 0 0 30px rgba(255,200,0,0.4);
      margin-bottom:10px;
    }
    #win-amount{
      font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:170px; letter-spacing:-3px;
      background:linear-gradient(180deg,#ffffff 0%,#ffe680 50%,#ffd700 100%);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      line-height:1;
      filter:drop-shadow(0 2px 8px rgba(0,0,0,0.5));
    }

    /* ── Video corner (transparent bg, 3× scale anchored at bottom-right) ── */
    #video-corner {
      position:absolute; bottom:0px; right:0px;
      width:1920px; height:1080px;
      z-index:10000; display:none;
      pointer-events:none;
    }
    #video-corner.visible{display:block;}
    #video-corner video{
      width:100%; height:100%;
      object-fit:contain;
      object-position:bottom right;
      background:transparent;
    }

    /* ── Loading screen ── */
    #loading-screen {
      position:absolute; inset:0;
      width:1920px; height:1080px;
      background:rgba(8,0,20,0.97);
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      z-index:99999;
      border-radius:24px;
      opacity:0; pointer-events:none;
      transition:opacity 0.4s ease;
    }
    #loading-screen.visible { opacity:1; pointer-events:all; }
    #loading-screen.hiding  { opacity:0; }
    #loading-title {
      font-family:'Inter','Arial',sans-serif; font-weight:600;
      font-size:180px; letter-spacing:-8px;
      color:#ffffff;
      text-shadow: 0 0 60px rgba(200,150,255,0.6), 0 0 120px rgba(160,80,255,0.3);
      margin-bottom:60px; line-height:1;
    }
    #loading-bar-wrap {
      width:600px; height:8px;
      background:rgba(255,255,255,0.12);
      border-radius:999px; overflow:hidden;
    }
    #loading-bar {
      height:100%; width:0%;
      background:linear-gradient(90deg,#8855ff,#cc88ff,#8855ff);
      background-size:200% 100%;
      border-radius:999px;
      animation:loadingBarMove 0.4s linear forwards, loadingShimmer 1s linear infinite;
    }
    @keyframes loadingBarMove { from{width:0%} to{width:100%} }
    @keyframes loadingShimmer {
      0%{background-position:0% 0%} 100%{background-position:200% 0%}
    }

    /* ── Ghost value float on case open ── */
    .ghost-value {
      position: absolute;
      font-family: 'Inter','Arial',sans-serif;
      font-weight: 600;
      font-size: 32px;
      color: #ffe066;
      text-shadow: 0 0 12px rgba(255,220,0,0.8), 2px 2px 0 rgba(0,0,0,0.9);
      pointer-events: none;
      z-index: 200;
      white-space: nowrap;
      animation: ghostFloat 2.2s ease-out forwards;
      transform-origin: center bottom;
    }
    @keyframes ghostFloat {
      0%   { opacity: 1; transform: translateY(0)   scale(1);    }
      30%  { opacity: 1; transform: translateY(-40px) scale(1.1); }
      100% { opacity: 0; transform: translateY(-130px) scale(0.7); }
    }
  </style>
</head>
<body>
<div id="widget-root">
  <div id="bg"></div>
  <div id="instruction-text">ОЖИДАНИЕ ИГРЫ...</div>

  <!-- Shelf cases -->
  <div class="case-layer" id="cl-1"></div><div class="case-layer" id="cl-2"></div>
  <div class="case-layer" id="cl-3"></div><div class="case-layer" id="cl-4"></div>
  <div class="case-layer" id="cl-5"></div><div class="case-layer" id="cl-6"></div>
  <div class="case-layer" id="cl-7"></div><div class="case-layer" id="cl-8"></div>
  <div class="case-layer" id="cl-9"></div><div class="case-layer" id="cl-10"></div>
  <div class="case-layer" id="cl-11"></div><div class="case-layer" id="cl-12"></div>
  <div class="case-layer" id="cl-13"></div><div class="case-layer" id="cl-14"></div>
  <div class="case-layer" id="cl-15"></div><div class="case-layer" id="cl-16"></div>

  <!-- Podium closed -->
  <div class="podium-layer" id="pl-1"></div><div class="podium-layer" id="pl-2"></div>
  <div class="podium-layer" id="pl-3"></div><div class="podium-layer" id="pl-4"></div>
  <div class="podium-layer" id="pl-5"></div><div class="podium-layer" id="pl-6"></div>
  <div class="podium-layer" id="pl-7"></div><div class="podium-layer" id="pl-8"></div>
  <div class="podium-layer" id="pl-9"></div><div class="podium-layer" id="pl-10"></div>
  <div class="podium-layer" id="pl-11"></div><div class="podium-layer" id="pl-12"></div>
  <div class="podium-layer" id="pl-13"></div><div class="podium-layer" id="pl-14"></div>
  <div class="podium-layer" id="pl-15"></div><div class="podium-layer" id="pl-16"></div>

  <!-- Podium opened (po1–po16) -->
  <div class="podium-open-layer" id="po-1"></div><div class="podium-open-layer" id="po-2"></div>
  <div class="podium-open-layer" id="po-3"></div><div class="podium-open-layer" id="po-4"></div>
  <div class="podium-open-layer" id="po-5"></div><div class="podium-open-layer" id="po-6"></div>
  <div class="podium-open-layer" id="po-7"></div><div class="podium-open-layer" id="po-8"></div>
  <div class="podium-open-layer" id="po-9"></div><div class="podium-open-layer" id="po-10"></div>
  <div class="podium-open-layer" id="po-11"></div><div class="podium-open-layer" id="po-12"></div>
  <div class="podium-open-layer" id="po-13"></div><div class="podium-open-layer" id="po-14"></div>
  <div class="podium-open-layer" id="po-15"></div><div class="podium-open-layer" id="po-16"></div>

  <!-- Value slots left (ids and text updated dynamically from Firebase) -->
  <div class="value-slot slot-left-1 left-slot" id="vslot-1"><span class="val-text">—</span></div>
  <div class="value-slot slot-left-2 left-slot" id="vslot-2"><span class="val-text">—</span></div>
  <div class="value-slot slot-left-3 left-slot" id="vslot-3"><span class="val-text">—</span></div>
  <div class="value-slot slot-left-4 left-slot" id="vslot-4"><span class="val-text">—</span></div>
  <div class="value-slot slot-left-5 left-slot" id="vslot-5"><span class="val-text">—</span></div>
  <div class="value-slot slot-left-6 left-slot" id="vslot-6"><span class="val-text">—</span></div>
  <div class="value-slot slot-left-7 left-slot" id="vslot-7"><span class="val-text">—</span></div>
  <div class="value-slot slot-left-8 left-slot" id="vslot-8"><span class="val-text">—</span></div>
  <!-- Value slots right -->
  <div class="value-slot slot-right-1 right-slot" id="vslot-9"><span class="val-text">—</span></div>
  <div class="value-slot slot-right-2 right-slot" id="vslot-10"><span class="val-text">—</span></div>
  <div class="value-slot slot-right-3 right-slot" id="vslot-11"><span class="val-text">—</span></div>
  <div class="value-slot slot-right-4 right-slot" id="vslot-12"><span class="val-text">—</span></div>
  <div class="value-slot slot-right-5 right-slot" id="vslot-13"><span class="val-text">—</span></div>
  <div class="value-slot slot-right-6 right-slot" id="vslot-14"><span class="val-text">—</span></div>
  <div class="value-slot slot-right-7 right-slot" id="vslot-15"><span class="val-text">—</span></div>
  <div class="value-slot slot-right-8 right-slot" id="vslot-16"><span class="val-text">—</span></div>

  <!-- Banker popup -->
  <div id="banker-popup">
    <img id="banker-banner-img" src="" alt="">
    <h1>☎ КОСТИЗИ ПРЕДЛАГАЕТ</h1>
    <div id="banker-offer-amount">0 ₽</div>
    <div id="banker-hint">
      <span class="hint-deal">💰 ЗАБРАТЬ ДЕНЬГИ</span>
      <span class="hint-sep">или</span>
      <span class="hint-nodeal">🎲 ИГРАТЬ ДАЛЬШЕ</span>
    </div>
  </div>

  <!-- Deal taken win (fade, center, no overlay) -->
  <div id="deal-win-popup">
    <div id="deal-win-label">💰 СДЕЛКА!</div>
    <div id="deal-win-amount">0 ₽</div>
  </div>
  <!-- Deal info strip: what was in player's case -->
  <div id="deal-info-strip">
    <div class="strip-text">В твоём кейсе было: <span class="strip-hl" id="deal-case-val">—</span></div>
  </div>

  <!-- Final bottom strip -->
  <div id="final-banner">
    <div class="final-body">
      Осталось <span class="hl">2 КЕЙСА</span>. Можешь <span class="hl">ОСТАВИТЬ СВОЙ</span> или <span class="hl">ПОМЕНЯТЬСЯ</span> на тот, что на полке. Решение только за тобой!
    </div>
  </div>

  <!-- Final choice buttons -->
  <div id="final-buttons">
    <button class="choice-btn" id="btn-keep">✅ ОСТАВИТЬ</button>
    <button class="choice-btn" id="btn-swap">🔄 ПОМЕНЯТЬ</button>
  </div>

  <!-- Final win (scale+rise from 960,720) -->
  <div id="win-popup">
    <div id="win-label">🎉 ТВОЙ ВЫИГРЫШ!</div>
    <div id="win-amount">0 ₽</div>
  </div>

  <!-- Video corner -->
  <div id="video-corner">
    <video id="video-el" playsinline></video>
  </div>
  <!-- Loading screen -->
  <div id="loading-screen">
    <!-- Video mode (if loading-video asset set) -->
    <video id="loading-video-el" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;display:none;" playsinline muted></video>
    <!-- Default KSTZ text mode -->
    <div id="loading-text-wrap" style="position:relative;z-index:2;display:flex;flex-direction:column;align-items:center;">
      <div id="loading-title">KSTZ</div>
      <div id="loading-bar-wrap"><div id="loading-bar"></div></div>
    </div>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getDatabase, ref, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyC1Lde9n2SroxE024-5Jned8ItOEuYQGLI",
    authDomain: "dornod-74e98.firebaseapp.com",
    databaseURL: "https://dornod-74e98-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "dornod-74e98",
    storageBucket: "dornod-74e98.firebasestorage.app",
    messagingSenderId: "941512359529",
    appId: "1:941512359529:web:bac6084dba4d9c66192cf8"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);
  const gameRef   = ref(db, 'widgets/deal_or_no_deal');
  const assetsRef = ref(db, 'widgets/assets');
  const TOTAL = 16;
  const fmt = n => n.toLocaleString('ru-RU') + ' ₽';
  function caseWord(n){ return n===1?'КЕЙС':n<=4?'КЕЙСА':'КЕЙСОВ'; }

  // ── State ──
  let assets        = {};
  let prevPlayerCase = null;
  let prevShowBanker = false;
  let prevGameState  = null;

  // ── Volume state (loaded from localStorage) ──
  let volVideo = parseFloat(localStorage.getItem('dnd_vol_video') ?? '0.85');
  let volMusic = parseFloat(localStorage.getItem('dnd_vol_music') ?? '0.60');
  let volSfx   = parseFloat(localStorage.getItem('dnd_vol_sfx')   ?? '0.80');
  // Track all active sfx audio elements to update volume live
  const activeSfx = new Set();

  // ── Media refs ──
  const videoCorner = document.getElementById('video-corner');
  const videoEl     = document.getElementById('video-el');
  let   bgAudioEl   = null;
  let   videoPlayed = { start:false, pick:false, deal:false, result:false };

  // ── Apply assets ──

  // Case positions in 1920x1080 widget space (given by user)
  const CASE_POS = {
    1:  {x:500,  y:250},  2: {x:730,  y:243},  3: {x:960,  y:243},
    4:  {x:1195, y:250},  5: {x:1428, y:250},  6: {x:504,  y:416},
    7:  {x:743,  y:420},  8: {x:982,  y:420},  9: {x:1213, y:410},
    10: {x:1443, y:410}, 11: {x:443,  y:557}, 12: {x:650,  y:572},
    13: {x:865,  y:569}, 14: {x:1075, y:569}, 15: {x:1288, y:567},
    16: {x:1490, y:580},
  };

  // Show ghost value float at case position
  function showGhostValue(caseNum, value) {
    const pos = CASE_POS[caseNum];
    if (!pos) return;
    // Append to body (not widget-root) to avoid overflow:hidden clipping
    // Get widget-root offset on screen
    const root   = document.getElementById('widget-root');
    const dndEl  = document.getElementById('dnd-root');
    // We're inside dnd-root which is scaled — use widget-root's coordinate space directly
    // Since ghost is inside widget-root via dnd-root chain, append to dnd-root
    const ghost = document.createElement('div');
    ghost.className = 'ghost-value';
    ghost.style.left = (pos.x - 80) + 'px';
    ghost.style.top  = (pos.y - 20) + 'px';
    ghost.textContent = value.toLocaleString('ru-RU') + ' ₽';
    // Append to widget-root but override overflow via z-index trick
    root.appendChild(ghost);
    setTimeout(() => ghost.remove(), 2300);
  }

  function applyAssets(a) {
    if (!a) return;
    assets = a;
    if (a['фон'])   document.getElementById('bg').style.backgroundImage = `url('${a['фон']}')`;
    if (a['рамка']) document.documentElement.style.setProperty('--рамка-url', `url('${a['рамка']}')`);
    if (a['banker-banner']) {
      const img = document.getElementById('banker-banner-img');
      img.src = a['banker-banner'];
      img.onload = () => img.classList.add('loaded');
    }
    for (let i = 1; i <= TOTAL; i++) {
      const cl = document.getElementById(`cl-${i}`);
      if (cl && a[String(i)]) cl.style.backgroundImage = `url('${a[String(i)]}')`;
      const pl = document.getElementById(`pl-${i}`);
      if (pl && a[`p${i}`]) pl.style.backgroundImage = `url('${a[`p${i}`]}')`;
      const po = document.getElementById(`po-${i}`);
      if (po && a[`po${i}`]) po.style.backgroundImage = `url('${a[`po${i}`]}')`;
    }
  }
  onValue(assetsRef, s => applyAssets(s.val()));

  // ── Volume sync from Firebase — applies instantly to all active audio ──
  onValue(ref(db, 'widgets/dnd_volumes'), snap => {
    const v = snap.val();
    if (!v) return;
    if (v.video !== undefined) { volVideo = v.video; localStorage.setItem('dnd_vol_video', volVideo); }
    if (v.music !== undefined) { volMusic = v.music; localStorage.setItem('dnd_vol_music', volMusic); }
    if (v.sfx   !== undefined) { volSfx   = v.sfx;   localStorage.setItem('dnd_vol_sfx',   volSfx);   }
    // Apply to currently playing elements immediately
    if (bgAudioEl) bgAudioEl.volume = volMusic;
    videoEl.volume = volVideo;
    activeSfx.forEach(a => { if (!a.paused) a.volume = volSfx; });
    // Clean up finished sfx
    activeSfx.forEach(a => { if (a.ended || a.paused) activeSfx.delete(a); });
  });

  // ── Media helpers ──
  function pickRandom(baseKey, maxCount) {
    const avail = [];
    for (let i = 1; i <= maxCount; i++) {
      const u = assets[`${baseKey}-${i}`];
      if (u) avail.push(u);
    }
    return avail.length ? avail[Math.floor(Math.random() * avail.length)] : null;
  }

  function playVideo(url, onEnded) {
    if (!url) { if (onEnded) onEnded(); return; }
    videoEl.src    = url;
    videoEl.volume = volVideo;
    videoCorner.classList.add('visible');
    videoEl.load();
    videoEl.play().catch(() => {});
    videoEl.onended = () => {
      videoCorner.classList.remove('visible');
      videoEl.src = '';
      if (onEnded) onEnded();
    };
  }

  function triggerVideo(slot, maxCount, onEnded) {
    playVideo(pickRandom(slot, maxCount), onEnded);
  }

  function playAudio(key, loop = false) {
    const url = assets[key];
    if (!url) return null;
    const a  = new Audio(url);
    a.loop   = loop;
    a.volume = loop ? volMusic : volSfx;
    a.play().catch(() => {});
    if (!loop) {
      activeSfx.add(a);
      a.onended = () => activeSfx.delete(a);
    }
    return a;
  }

  function stopBgAudio() {
    if (bgAudioEl) { bgAudioEl.pause(); bgAudioEl.src = ''; bgAudioEl = null; }
  }

  // ── Loading screen ──
  let pendingStartVideo = false; // set to true if start video should play after loading

  function hideLoadingScreen() {
    const ls  = document.getElementById('loading-screen');
    const lve = document.getElementById('loading-video-el');
    if (!ls.classList.contains('visible')) return;
    ls.classList.add('hiding');
    setTimeout(() => {
      ls.classList.remove('visible', 'hiding');
      lve.pause(); lve.src = ''; lve.style.display = 'none';
      document.getElementById('loading-text-wrap').style.display = 'flex';
      document.getElementById('widget-root').style.pointerEvents = 'all';
      // Play start video now that loading is done
      if (pendingStartVideo) {
        pendingStartVideo = false;
        triggerVideo('vid-start', 2);
        bgAudioEl = playAudio('aud-bg', true);
      }
    }, 400);
  }

  // ── Main game listener ──
  onValue(gameRef, snapshot => {
    const d = snapshot.val();
    if (!d) return;

    const root       = document.getElementById('widget-root');
    const wasVisible = root.style.opacity === '1';
    const nowVisible = d.isVisible;

    // Fade in/out
    if (nowVisible && !wasVisible) {
      root.style.opacity = '1';
      root.style.pointerEvents = 'none';
      const ls  = document.getElementById('loading-screen');
      const lb  = document.getElementById('loading-bar');
      const lve = document.getElementById('loading-video-el');
      const ltw = document.getElementById('loading-text-wrap');
      ls.classList.add('visible');
      const loadUrl = assets['loading-video'];
      if (loadUrl) {
        lve.src = loadUrl; lve.style.display = 'block'; ltw.style.display = 'none';
        lve.load(); lve.play().catch(() => {});
        lve.onended = hideLoadingScreen;
        setTimeout(hideLoadingScreen, 8000); // fallback
      } else {
        lve.style.display = 'none'; ltw.style.display = 'flex';
        lb.style.animation = 'none'; void lb.offsetHeight;
        lb.style.animation = 'loadingBarMove 3s linear forwards, loadingShimmer 1s linear infinite';
        setTimeout(hideLoadingScreen, 3000);
      }
    } else if (!nowVisible && wasVisible) {
      root.style.opacity = '0';
      root.style.pointerEvents = 'none';
    }

    // ── Snapshot prev values for comparison (before any updates) ──
    const prevPlayerCaseSnap = prevPlayerCase;
    const prevShowBankerSnap = prevShowBanker;
    const prevGameStateSnap  = prevGameState;

    // Reset slots
    document.querySelectorAll('.value-slot').forEach(el => el.classList.remove('eliminated', 'last-remaining'));

    // Refresh value slot labels
    if (d.gameValues && Array.isArray(d.gameValues)) {
      d.gameValues.forEach((v, i) => {
        const slot = document.getElementById(`vslot-${i+1}`);
        if (slot) { slot.dataset.val = v; slot.querySelector('.val-text').textContent = fmt(v); }
      });
    }

    let openedCount = 0, remainingCount = 0;
    let playerCaseValue = 0;

    if (d.cases) {
      for (let i = 1; i <= TOTAL; i++) {
        const cd = d.cases[i];
        const cl = document.getElementById(`cl-${i}`);
        if (d.playerCase === i) {
          cl.classList.add('opened');
          remainingCount++;
          playerCaseValue = cd.value;
        } else if (cd && cd.isOpen) {
          const wasAlreadyOpen = cl.classList.contains('opened');
          cl.classList.add('opened');
          if (!wasAlreadyOpen) {
            showGhostValue(i, cd.value);
          }
          openedCount++;
          const ve = document.querySelector(`.value-slot[data-val="${cd.value}"]`);
          if (ve) ve.classList.add('eliminated');
        } else {
          cl.classList.remove('opened');
          remainingCount++;
        }
      }
      if (remainingCount <= 3 && d.gameState !== 'finished') {
        document.querySelectorAll('.value-slot:not(.eliminated)').forEach(el => el.classList.add('last-remaining'));
      }
    }

    // ── Podium logic ──
    const isSwapped = d.swapped === true && d.swappedTo;

    if (!d.playerCase) {
      document.querySelectorAll('.podium-layer,.podium-open-layer').forEach(p => p.classList.remove('visible'));
      prevPlayerCase = null;
    } else if (isSwapped) {
      const orig = d.playerCase, sw = d.swappedTo;
      document.querySelectorAll('.podium-layer,.podium-open-layer').forEach(p => p.classList.remove('visible'));
      if (d.gameState === 'finished') {
        const po = document.getElementById(`po-${sw}`);
        if (po && po.style.backgroundImage && po.style.backgroundImage !== 'none') po.classList.add('visible');
        else { const pl = document.getElementById(`pl-${sw}`); if (pl) pl.classList.add('visible'); }
      } else {
        const pl = document.getElementById(`pl-${sw}`); if (pl) pl.classList.add('visible');
      }
      const origCl = document.getElementById(`cl-${orig}`); if (origCl) origCl.classList.remove('opened');
      const swCl   = document.getElementById(`cl-${sw}`);   if (swCl)   swCl.classList.add('opened');
    } else if (d.gameState === 'finished' && !isSwapped && d.playerCase) {
      document.querySelectorAll('.podium-layer,.podium-open-layer').forEach(p => p.classList.remove('visible'));
      const po = document.getElementById(`po-${d.playerCase}`);
      if (po && po.style.backgroundImage && po.style.backgroundImage !== 'none') po.classList.add('visible');
      else { const pl = document.getElementById(`pl-${d.playerCase}`); if (pl) pl.classList.add('visible'); }
    } else if (prevPlayerCase !== d.playerCase) {
      document.querySelectorAll('.podium-layer,.podium-open-layer').forEach(p => p.classList.remove('visible'));
      const pl = document.getElementById(`pl-${d.playerCase}`); if (pl) pl.classList.add('visible');
      prevPlayerCase = d.playerCase;
    }

    // ── Instruction ──
    const it = document.getElementById('instruction-text');
    it.classList.remove('attention');
    const gs = d.gameState;
    if      (gs === 'choose_player_case') it.innerText = 'ВЫБЕРИ СВОЙ КЕЙС';
    else if (gs === 'playing') {
      const next = [6,12,14].find(t => t > openedCount);
      if (next) {
        const left = next - openedCount;
        const rs   = (next===6&&openedCount===0)||(next===12&&openedCount===6)||(next===14&&openedCount===12);
        it.innerText = `${rs?'ОТКРОЙ':'ОТКРОЙ ЕЩЕ'} ${left} ${caseWord(left)}`;
      }
    }
    else if (gs === 'banker_offer')  { it.innerText = 'ВЫБОР ЗА ТОБОЙ!'; it.classList.add('attention'); }
    else if (gs === 'final_swap')    { it.innerText = 'ОСТАВИТЬ ИЛИ ПОМЕНЯТЬ?'; it.classList.add('attention'); }
    else if (gs === 'finished')      { it.innerText = 'ДА БУДЕТ СВЕТ!'; }
    else                               it.innerText = 'ОЖИДАНИЕ ИГРЫ...';

    // ── Final strip + buttons ──
    const showFinal = gs === 'final_swap' && !isSwapped;
    document.getElementById('final-banner').classList.toggle('visible', showFinal);
    document.getElementById('final-buttons').classList.toggle('visible', showFinal);

    // ── Banker popup ──
    if (d.showBanker) {
      document.getElementById('banker-offer-amount').innerText = fmt(d.bankerOffer);
      document.getElementById('banker-popup').classList.add('visible');
    } else document.getElementById('banker-popup').classList.remove('visible');

    // ── Deal win (mid-game) ──
    const isDeal = gs === 'finished' && d.dealTaken === true;
    if (isDeal) {
      document.getElementById('deal-win-amount').innerText = fmt(d.winAmount);
      document.getElementById('deal-win-popup').classList.add('visible');
      if (playerCaseValue) {
        document.getElementById('deal-case-val').innerText = fmt(playerCaseValue);
        document.getElementById('deal-info-strip').classList.add('visible');
      }
    } else {
      document.getElementById('deal-win-popup').classList.remove('visible');
      document.getElementById('deal-info-strip').classList.remove('visible');
    }

    // ── Final win popup (shown after reaction video) ──
    if (gs !== 'finished' || d.dealTaken === true) {
      document.getElementById('win-popup').classList.remove('visible');
    }
    // win-popup shown by media engine below

    // ══ Media triggers ══
    if (gs === 'choose_player_case' && prevGameStateSnap !== 'choose_player_case') {
      videoPlayed = { start:false, pick:false, deal:false, result:false };
      document.getElementById('win-popup').classList.remove('visible');
      stopBgAudio();
      videoPlayed.start = true;
      // Check if loading screen is still visible — if yes, defer; if no, play now
      const ls = document.getElementById('loading-screen');
      if (ls.classList.contains('visible')) {
        pendingStartVideo = true; // will fire in hideLoadingScreen
      } else {
        triggerVideo('vid-start', 2);
        bgAudioEl = playAudio('aud-bg', true);
      }
    }

    if (d.playerCase && !prevPlayerCaseSnap && !videoPlayed.pick) {
      videoPlayed.pick = true;
      triggerVideo('vid-pick', 2);
      playAudio('aud-pick');
    }

    if (gs === 'playing' && prevGameStateSnap === 'playing' && openedCount > prevOpenedCount) {
      playAudio('aud-open');
    }

    if (d.showBanker && !prevShowBankerSnap) {
      playAudio('aud-banker');
    }

    if (gs === 'finished' && d.dealTaken === true && !videoPlayed.deal) {
      videoPlayed.deal = true;
      stopBgAudio();
      triggerVideo('vid-deal', 2);
      playAudio('aud-deal');
    }

    if (gs === 'finished' && d.dealTaken !== true && !videoPlayed.result) {
      videoPlayed.result = true;
      stopBgAudio();
      playAudio('aud-final');

      let finalVals = [];
      if (d.cases && d.playerCase) {
        finalVals.push(d.cases[d.playerCase].value);
        const otherIdx = d.swappedTo || Object.keys(d.cases).find(k =>
          parseInt(k) !== d.playerCase && !d.cases[k].isOpen
        );
        if (otherIdx && d.cases[otherIdx]) finalVals.push(d.cases[otherIdx].value);
      }
      const maxFinal = finalVals.length > 0 ? Math.max(...finalVals) : (d.winAmount||0)+1;
      const isHigh   = (d.winAmount||0) >= maxFinal;
      const resultSlot = isHigh ? 'vid-win-high' : 'vid-win-low';

      // Step 1: reaction video → Step 2: open case image + show win + result video
      const revealWin = () => {
        document.getElementById('win-amount').innerText = fmt(d.winAmount);
        document.getElementById('win-popup').classList.add('visible');
        triggerVideo(resultSlot, 3);
        playAudio(isHigh ? 'aud-win-big' : 'aud-win-small');
      };

      const reactionUrl = pickRandom('vid-final-reaction', 2);
      if (reactionUrl) playVideo(reactionUrl, revealWin);
      else revealWin();
    }

    prevShowBanker  = d.showBanker;
    prevGameState   = gs;
    prevOpenedCount = openedCount;
  });
</script>
</body>
</html>
