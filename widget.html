<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 10px; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; background: transparent; overflow: hidden; }
        
        /* Збільшено ширину з 330px до 430px (на ~30%), а також всі відступи */
        .tracker-container { 
            width: 430px; height: fit-content; background: rgba(10, 10, 14, 0.98); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            border-radius: 30px; padding: 18px; box-shadow: 0 26px 65px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.05); 
            border: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 0; transition: margin-bottom 0.3s ease; }
        .tracker-container.has-items .stats-grid { margin-bottom: 18px; }
        
        .stat-card { background: rgba(25, 25, 35, 0.8); border-radius: 15px; padding: 10px 4px; text-align: center; border: 1px solid rgba(255,255,255,0.02); box-shadow: inset 0 1px 1px rgba(255,255,255,0.02); }
        .stat-icon { font-size: 17px; margin-bottom: 4px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .stat-val { font-size: 14px; font-weight: 800; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
        
        .slots-viewport { display: none; height: auto; max-height: 380px; overflow: hidden; position: relative; border-radius: 18px; }
        .slots-list { display: flex; flex-direction: column; gap: 9px; width: 100%; box-sizing: border-box; }
        
        /* Збільшено висоту рядка слота та внутрішні відступи */
        .slot-row { display: flex; align-items: center; padding: 13px 16px; background: rgba(18, 18, 24, 0.85); border-radius: 18px; border: 1px solid rgba(255,255,255,0.01); box-sizing: border-box; height: 68px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* Збільшено іконки */
        .slot-icon-wrapper { position: relative; width: 42px; height: 42px; margin-right: 16px; flex-shrink: 0; }
        .slot-icon-img { width: 100%; height: 100%; border-radius: 10px; background: #222; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        
        .slot-icon-text { 
            width: 100%; height: 100%; border-radius: 10px; background: linear-gradient(135deg, #1a1a24, #111116); color: #ffb703; 
            border: 1px solid rgba(255, 183, 3, 0.15); display: flex; align-items: center; justify-content: center; 
            font-size: 13px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.3); letter-spacing: 0.5px;
        }

        .crown-overlay { display: none; }
        .mode-finish .crown-overlay {
            display: block; position: absolute; top: -13px; left: -13px; font-size: 21px; transform: rotate(-28deg);
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.9)) drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
            z-index: 10; animation: crownPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes crownPop {
            0% { transform: scale(0) rotate(-60deg); opacity: 0; }
            100% { transform: scale(1) rotate(-28deg); opacity: 1; }
        }
        
        .slot-info { flex-grow: 1; min-width: 0; }
        /* Збільшено шрифти тексту */
        .slot-name { font-size: 16px; font-weight: 700; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .slot-amounts { font-size: 14.5px; color: #64748b; font-weight: 500; margin-top: 2px; }
        .arrow-blue { color: #00f2fe; font-weight: bold; margin: 0 4px; filter: drop-shadow(0 0 4px rgba(0,242,254,0.4)); }
        
        /* Збільшено бейдж іксів */
        .multiplier-badge { font-size: 14px; font-weight: 800; padding: 6px 10px; border-radius: 26px; min-width: 68px; text-align: center; box-sizing: border-box; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .mult-pending { background: rgba(30, 41, 59, 0.75); color: #94a3b8; border: 1px solid rgba(255,255,255,0.03); }
        .mult-loss { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .mult-win { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); filter: drop-shadow(0 0 6px rgba(16,185,129,0.15)); }
        
        .mode-bonusbuy .slot-row { opacity: 0.25; transform: scale(0.96); filter: blur(0.5px); }
        .mode-bonusbuy .slot-row.active { 
            opacity: 1; filter: none; background: linear-gradient(90deg, rgba(124, 58, 237, 0.16) 0%, rgba(18, 18, 24, 0.8) 100%); 
            border: 1px solid rgba(124, 58, 237, 0.3); transform: scale(1.03); box-shadow: 0 10px 25px rgba(124, 58, 237, 0.25);
        }
        .mode-bonusbuy .slot-row.active .slot-name { font-size: 16.5px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .mode-finish .slots-list { animation: infiniteWheel 18s linear infinite; }
        @keyframes infiniteWheel { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
    </style>
</head>
<body>

<div id="main-container" class="tracker-container">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">💰</span><span id="stat-total" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-icon">⭐</span><span id="stat-count" class="stat-val">0/0</span></div>
        <div class="stat-card"><span class="stat-icon">⚖️</span><span id="stat-avg" class="stat-val">0.00x</span></div>
        <div class="stat-card"><span class="stat-icon">🎯</span><span id="stat-max" class="stat-val">0.00x</span></div>
    </div>
    <div id="viewport" class="slots-viewport">
        <div id="slots-container" class="slots-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD5A81EQXjywE72h3zbqaqwNAUbO8I7KNc",
      authDomain: "obswidget-110cf.firebaseapp.com",
      databaseURL: "https://obswidget-110cf-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "obswidget-110cf",
      storageBucket: "obswidget-110cf.firebasestorage.app",
      messagingSenderId: "336642071325",
      appId: "1:336642071325:web:b985339f1f3ab75222dff4",
      measurementId: "G-Y2C8DRSYH1"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // Форматування для верхньої панелі (100к, 1кк)
    function formatNumberCompact(num) {
        num = Number(num);
        if (isNaN(num) || num === 0) return '0';
        let absNum = Math.abs(num);
        let sign = num < 0 ? '-' : '';
        if (absNum >= 1000000) return sign + parseFloat((absNum / 1000000).toFixed(2)) + 'кк';
        if (absNum >= 1000) return sign + parseFloat((absNum / 1000).toFixed(2)) + 'к';
        return sign + absNum.toString();
    }

    // НОВЕ: Форматування для списку слотів (52,000)
    function formatNumberWithCommas(num) {
        return Number(num).toLocaleString('en-US'); // Розділяє тисячі комою
    }

    db.ref('/').on('value', function(snapshot) {
        const data = snapshot.val() || {};
        const slots = data.slots ? Object.values(data.slots) : [];
        const activeIndex = data.active_index !== undefined ? data.active_index : 0;
        const displayMode = data.display_mode || 'hunt';
        const startBalance = data.start_balance ?? 0;
        const balanceCurr = data.start_balance_currency || '₽';
        const customIcons = data.custom_icons || {};

        const mainContainer = document.getElementById('main-container');
        if (mainContainer) {
            mainContainer.className = 'tracker-container ' + (slots.length > 0 ? 'has-items ' : '') + 'mode-' + displayMode;
        }

        let totalWin = 0;
        let totalBuy = 0;
        let openedCount = 0;
        let maxX = 0;

        slots.forEach(function(s, idx) {
            const buy = Number(s.buy || 0);
            const win = Number(s.win || 0);
            totalBuy += buy;
            totalWin += win;
            
            if (win > 0 || (win === 0 && idx < activeIndex)) openedCount++;
            
            if (buy > 0 && win > 0) {
                const x = win / buy;
                if (x > maxX) maxX = x;
            }
        });

        const avgX = totalBuy > 0 ? (totalWin / totalBuy) : 0;

        // ВЕРХНЯ ПАНЕЛЬ ВИКОРИСТОВУЄ "1кк"
        document.getElementById('stat-total').innerText = formatNumberCompact(startBalance) + ' ' + balanceCurr;
        document.getElementById('stat-count').innerText = openedCount + '/' + slots.length;
        document.getElementById('stat-avg').innerText = avgX.toFixed(2) + 'x';
        document.getElementById('stat-max').innerText = maxX.toFixed(2) + 'x';

        const viewport = document.getElementById('viewport');
        if (slots.length > 0) viewport.style.display = 'block';
        else viewport.style.display = 'none';

        const container = document.getElementById('slots-container');
        if (!container) return;
        container.innerHTML = '';

        let slotsToRender = [];
        if (displayMode === 'hunt') {
            slotsToRender = slots.map(function(s, idx) { return Object.assign({}, s, {originalIndex: idx}); }).slice(-5);
        } else {
            slotsToRender = slots.map(function(s, idx) { return Object.assign({}, s, {originalIndex: idx}); });
        }

        slotsToRender.forEach(function(slot) {
            const isActive = slot.originalIndex === activeIndex;
            const slotCur = slot.currency || '₽';
            const buy = Number(slot.buy || 0);
            const win = Number(slot.win || 0);
            
            let xValText = '—';
            let multClass = 'mult-pending';
            
            if (win > 0 && buy > 0) {
                const x = win / buy;
                xValText = x.toFixed(2) + 'x';
                multClass = x >= 1 ? 'mult-win' : 'mult-loss';
            } else if (win === 0 && slot.originalIndex < activeIndex) {
                xValText = '0.00x';
                multClass = 'mult-loss';
            }

            let isCrown = false;
            if (displayMode === 'finish' && win > 0 && buy > 0 && (win/buy) === maxX && maxX > 0) {
                isCrown = true;
            }

            let iconInner = '?';
            if (customIcons[slot.name]) {
                iconInner = `<img class="slot-icon-img" src="${customIcons[slot.name]}">`;
            } else if (slot.name) {
                iconInner = `<div class="slot-icon-text">${slot.name.substring(0, 2)}</div>`;
            }

            // РЯДКИ ЗІ СЛОТАМИ ВИКОРИСТОВУЮТЬ ФОРМАТ З КОМАМИ (52,000)
            const buyFormatted = formatNumberWithCommas(buy);
            const winFormatted = win > 0 ? formatNumberWithCommas(win) : '';
            const winDisplayHTML = win > 0 ? `<span class="arrow-blue">➔</span> <span style="color:#2ecc71;">${winFormatted} ${slotCur}</span>` : '';

            container.innerHTML += `
                <div class="slot-row ${isActive ? 'active' : ''}">
                    <div class="slot-icon-wrapper">
                        ${iconInner}
                        ${isCrown ? '<div class="crown-overlay">👑</div>' : ''}
                    </div>
                    <div class="slot-info">
                        <div class="slot-name">${slot.name}</div>
                        <div class="slot-amounts">${buyFormatted} ${slotCur} ${winDisplayHTML}</div>
                    </div>
                    <div class="multiplier-badge ${multClass}">${xValText}</div>
                </div>
            `;
        });
    }, function(error) {
        console.error("Firebase Rule Error:", error);
    });
</script>
</body>
</html>
