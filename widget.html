<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        html, body { background: transparent !important; background-color: rgba(0, 0, 0, 0) !important; margin: 0; padding: 15px; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; overflow: hidden; }
        
        .tracker-container { margin: 0 auto; width: 560px; height: fit-content; background: rgba(10, 10, 14, 0.98); border-radius: 36px; padding: 24px; box-shadow: 0 35px 85px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.05); border: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; box-sizing: border-box; transition: all 0.4s; position: relative; }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 0; transition: margin-bottom 0.3s ease; }
        .tracker-container.has-items .stats-grid { margin-bottom: 24px; }
        
        .stat-card { background: rgba(25, 25, 35, 0.8); border-radius: 18px; padding: 14px 6px; text-align: center; border: 1px solid rgba(255,255,255,0.02); box-shadow: inset 0 1px 2px rgba(255,255,255,0.02); }
        .stat-icon { font-size: 22px; margin-bottom: 6px; display: block; filter: drop-shadow(0 3px 6px rgba(0,0,0,0.5)); }
        .stat-val { font-size: 18px; font-weight: 800; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
        
        .slots-viewport { display: none; height: auto; max-height: 540px; overflow: hidden; position: relative; border-radius: 24px; padding: 10px; margin: -10px; }
        .slots-list { display: flex; flex-direction: column; gap: 12px; width: 100%; box-sizing: border-box; }
        .slot-row { display: flex; align-items: center; padding: 18px 22px; background: rgba(18, 18, 24, 0.85); border-radius: 24px; border: 1px solid rgba(255,255,255,0.01); box-sizing: border-box; height: 88px; transition: all 0.4s; }
        .slot-icon-wrapper { position: relative; width: 55px; height: 55px; margin-right: 20px; flex-shrink: 0; }
        .slot-icon-img { width: 100%; height: 100%; border-radius: 14px; background: #222; object-fit: cover; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .slot-icon-text { width: 100%; height: 100%; border-radius: 14px; background: linear-gradient(135deg, #1a1a24, #111116); color: #ffb703; border: 1px solid rgba(255, 183, 3, 0.15); display: flex; align-items: center; justify-content: center; font-size: 17px; font-weight: 800; text-transform: uppercase; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        
        .mode-bonusbuy .slot-row { opacity: 0.25; transform: scale(0.96); filter: blur(0.5px); }
        .mode-bonusbuy .slot-row.active { opacity: 1; filter: none; background: linear-gradient(90deg, rgba(124, 58, 237, 0.16) 0%, rgba(18, 18, 24, 0.8) 100%); border: 1px solid rgba(124, 58, 237, 0.3); transform: scale(1.03); box-shadow: 0 14px 35px rgba(124, 58, 237, 0.25); }

        /* === БИТВА СТИЛИ === */
        .battle-container { width: 900px; padding: 26px; }
        .battle-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; position: relative; }
        .battle-player-block { flex: 1; display: flex; flex-direction: column; position: relative; }
        .battle-player-block.p1 { text-align: left; align-items: flex-start; }
        .battle-player-block.p2 { text-align: right; align-items: flex-end; }
        .b-name { font-size: 38px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; display: flex; align-items: center; gap: 8px; }
        .p1 .b-name { color: #3498db; }
        .p2 .b-name { color: #e74c3c; }
        .b-meta { font-size: 20px; color: #a4a4af; margin-top: 6px; font-weight: 700; }
        .player-crown { font-size: 36px; position: absolute; top: -42px; display: none; z-index: 10; }
        .p1 .player-crown { left: 10px; transform: rotate(-15deg); }
        .p2 .player-crown { right: 10px; transform: rotate(15deg); }

        .battle-score-center { background: rgba(255,183,3,0.08); border: 1px solid rgba(255,183,3,0.25); padding: 12px 34px; border-radius: 22px; font-size: 36px; font-weight: 800; color: #ffb703; text-align: center; display: flex; gap: 14px; align-items: center; margin: 0 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .battle-row { display: flex; align-items: center; background: rgba(18, 18, 24, 0.85); border-radius: 24px; border: 1px solid rgba(255,255,255,0.01); height: 95px; padding: 0 16px; box-sizing: border-box; transition: all 0.4s; position: relative; overflow: hidden; }
        .b-side { flex: 1; display: flex; align-items: center; min-width: 0; height: 100%; padding: 0 8px; transition: all 0.4s; }
        .b-side-p2 { flex-direction: row-reverse; text-align: right; }
        .b-divider-vs { font-size: 14px; font-weight: 800; color: rgba(255,255,255,0.15); margin: 0 15px; z-index: 2; }
        .arrow-blue { color: #00f2fe; font-weight: bold; margin: 0 6px; }
        .multiplier-badge { font-size: 18px; font-weight: 800; padding: 8px 14px; border-radius: 30px; min-width: 88px; text-align: center; }
        .mult-pending { background: rgba(30, 41, 59, 0.75); color: #94a3b8; }
        .mult-loss { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .mult-win { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }

        /* ТОСТ СНАЙПЕРА */
        .winner-toast { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(40px); background: linear-gradient(135deg, #ff9f43 0%, #ffb703 100%); padding: 18px 28px; border-radius: 24px; box-shadow: 0 20px 45px rgba(255, 183, 3, 0.4); border: 2px solid #fff; display: flex; align-items: center; gap: 14px; color: #000; font-weight: 800; font-size: 18px; z-index: 999; opacity: 0; pointer-events: none; transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .winner-toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* ЖИВАЯ СМУЖКА БИТВЫ */
        .faction-bar-wrapper { width: 100%; margin-bottom: 24px; display: flex; flex-direction: column; gap: 4px; }
        .faction-bar { width: 100%; height: 10px; background: rgba(255,255,255,0.04); border-radius: 20px; overflow: hidden; display: flex; border: 1px solid rgba(255,255,255,0.01); }
        .f-progress-p1 { background: linear-gradient(90deg, #1d7afc, #3498db); height: 100%; width: 50%; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .f-progress-p2 { background: linear-gradient(90deg, #e74c3c, #c0392b); height: 100%; width: 50%; transition: width 0.6s cubic-bezier(0.16, 1, 0.3, 1); }
        .f-labels { display: flex; justify-content: space-between; font-size: 13px; font-weight: bold; color: #8a8a93; padding: 0 4px; }
    </style>
</head>
<body>

<div id="solo-container" class="tracker-container" style="display: none;">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">💰</span><span id="stat-total" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-icon">⭐</span><span id="stat-count" class="stat-val">0/0</span></div>
        <div class="stat-card"><span class="stat-icon">🔮</span><span id="stat-guess-count" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-icon">⚖️</span><span id="stat-avg-opened" class="stat-val">0.00x</span></div>
    </div>
    <div id="viewport" class="slots-viewport">
        <div id="slots-container" class="slots-list"></div>
    </div>

    <div id="winner-toast" class="winner-toast">
        <span style="font-size: 26px;">👑</span>
        <div>
            <div style="font-size: 13px; text-transform: uppercase; opacity: 0.8; letter-spacing: 0.5px;">Снайпер иксов чата!</div>
            <div id="winner-text"><span style="color:#fff;">User</span> угадал <span style="color:#fff;">250x</span>!</div>
        </div>
    </div>
</div>

<div id="battle-container" class="tracker-container battle-container" style="display: none;">
    <div class="stats-grid" id="battle-stats-bar" style="grid-template-columns: repeat(3, 1fr); display: none; margin-bottom: 16px;">
        <div class="stat-card"><span class="stat-icon">💰</span><span id="b-stat-shared-depo" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-icon">⭐</span><span id="b-stat-shared-count" class="stat-val">0/0</span></div>
        <div class="stat-card"><span class="stat-icon">⚖️</span><span id="b-stat-shared-comeback" class="stat-val">0.00x</span></div>
    </div>

    <div class="battle-header">
        <div class="battle-player-block p1">
            <div class="player-crown" id="crown-p1">👑</div>
            <span id="b-p1-name" class="b-name">Игрок 1</span>
            <span id="b-p1-meta" class="b-meta">⚖️ 0.00x</span>
        </div>
        <div class="battle-score-center">
            <span id="b-score-p1">0</span> <span style="color:#64748b; font-size:20px;">VS</span> <span id="b-score-p2">0</span>
        </div>
        <div class="battle-player-block p2">
            <div class="player-crown" id="crown-p2">👑</div>
            <span id="b-p2-name" class="b-name">Игрок 2</span>
            <span id="b-p2-meta" class="b-meta">⚖️ 0.00x</span>
        </div>
    </div>

    <div class="faction-bar-wrapper">
        <div class="faction-bar">
            <div id="f-bar-p1" class="f-progress-p1"></div>
            <div id="f-bar-p2" class="f-progress-p2"></div>
        </div>
        <div class="f-labels">
            <span id="f-label-p1">50% чата (!p1)</span>
            <span id="f-label-p2">50% чата (!p2)</span>
        </div>
    </div>

    <div id="battle-viewport" class="slots-viewport">
        <div id="battle-slots-container" class="slots-list"></div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyD5A81EQXjywE72h3zbqaqwNAUbO8I7KNc",
      authDomain: "obswidget-110cf.firebaseapp.com",
      databaseURL: "https://obswidget-110cf-default-rtdb.europe-west1.firebasedatabase.app/",
      projectId: "obswidget-110cf",
      storageBucket: "obswidget-110cf.firebasestorage.app",
      messagingSenderId: "336642071325",
      appId: "1:336642071325:web:b985339f1f3ab75222dff4",
      measurementId: "G-Y2C8DRSYH1"
    };
    firebase.initializeApp(firebaseConfig); const db = firebase.database();

    let lastWinnerTimestamp = 0;

    function formatNumberCompact(num) { num = Number(num); if (isNaN(num) || num === 0) return '0'; let absNum = Math.abs(num); let sign = num < 0 ? '-' : ''; if (absNum >= 1000000) return sign + parseFloat((absNum / 1000000).toFixed(2)) + 'кк'; if (absNum >= 1000) return sign + parseFloat((absNum / 1000).toFixed(2)) + 'к'; return sign + absNum.toString(); }
    function formatNumberWithCommas(num) { return Number(num).toLocaleString('en-US'); }

    db.ref('last_winner').on('value', function(snapshot) {
        const winner = snapshot.val();
        if (winner && winner.timestamp && winner.timestamp > lastWinnerTimestamp) {
            if (lastWinnerTimestamp !== 0) { showWinnerAnimation(winner.name, winner.guess, winner.actual); }
            lastWinnerTimestamp = winner.timestamp;
        }
    });

    function showWinnerAnimation(name, guess, actual) {
        const toast = document.getElementById('winner-toast');
        document.getElementById('winner-text').innerHTML = `<span style="color:#000;">${name}</span> угадал <span style="color:#fff; background:#000; padding:2px 6px; border-radius:6px;">${guess}x</span> (Выпало: ${actual}x)`;
        toast.classList.add('show');
        setTimeout(() => { toast.classList.remove('show'); }, 7000);
    }

    db.ref('/').on('value', function(snapshot) {
        const data = snapshot.val() || {};
        const mode = data.global_mode || 'solo';

        if (mode === 'solo') {
            document.getElementById('solo-container').style.display = 'flex'; document.getElementById('battle-container').style.display = 'none';
            renderSoloMode(data);
        } else {
            document.getElementById('solo-container').style.display = 'none'; document.getElementById('battle-container').style.display = 'flex';
            renderBattleMode(data.battle || {}, data.custom_icons || {});
        }
    });

    function renderSoloMode(data) {
        const slots = data.slots ? Object.values(data.slots) : [];
        const activeIndex = data.active_index !== undefined ? data.active_index : 0;
        const displayMode = data.display_mode || 'hunt';
        const startBalance = data.start_balance ?? 0; const balanceCurr = data.start_balance_currency || '₽';
        const customIcons = data.custom_icons || {};

        const mainContainer = document.getElementById('solo-container');
        if (mainContainer) mainContainer.className = 'tracker-container ' + (slots.length > 0 ? 'has-items ' : '') + 'mode-' + displayMode;

        let totalWin = 0; let totalBuy = 0; let openedCount = 0; let openedTotalBuy = 0; let openedTotalWin = 0;
        slots.forEach(function(s, idx) {
            const buy = Number(s.buy || 0); const win = Number(s.win || 0); totalBuy += buy; totalWin += win;
            if (win > 0 || (win === 0 && idx < activeIndex)) { openedCount++; openedTotalBuy += buy; openedTotalWin += win; }
        });

        const openedAvgX = openedTotalBuy > 0 ? (openedTotalWin / openedTotalBuy) : 0;

        document.getElementById('stat-total').innerText = formatNumberCompact(startBalance) + ' ' + balanceCurr;
        document.getElementById('stat-count').innerText = openedCount + '/' + slots.length;
        document.getElementById('stat-guess-count').innerText = data.current_guesses_count || 0; 
        document.getElementById('stat-avg-opened').innerText = openedAvgX.toFixed(2) + 'x'; 

        const viewport = document.getElementById('viewport'); if (slots.length > 0) viewport.style.display = 'block'; else viewport.style.display = 'none';
        const container = document.getElementById('slots-container'); if (!container) return;

        let slotsToRender = (displayMode === 'hunt') ? slots.map((s,i)=>Object.assign({},s,{orig:i})).slice(-5) : slots.map((s,i)=>Object.assign({},s,{orig:i}));
        let listHTML = '';

        slotsToRender.forEach(function(slot) {
            const isActive = slot.orig === activeIndex; const slotCur = slot.currency || '₽'; const buy = Number(slot.buy || 0); const win = Number(slot.win || 0);
            let xValText = '—'; let multClass = 'mult-pending';
            if (win > 0 && buy > 0) { xValText = (win / buy).toFixed(2) + 'x'; multClass = (win / buy) >= 1 ? 'mult-win' : 'mult-loss'; } else if (win === 0 && slot.orig < activeIndex) { xValText = '0.00x'; multClass = 'mult-loss'; }
            let iconInner = customIcons[slot.name] ? `<img class="slot-icon-img" src="${customIcons[slot.name]}">` : `<div class="slot-icon-text">${(slot.name || '?').substring(0, 2)}</div>`;
            listHTML += `<div class="slot-row ${isActive ? 'active' : ''}"><div class="slot-icon-wrapper">${iconInner}</div><div class="slot-info"><div class="slot-name">${slot.name}</div><div class="slot-amounts">${formatNumberWithCommas(buy)} ${slotCur} ${win > 0 ? `<span class="arrow-blue">➔</span> <span style="color:#2ecc71;">${formatNumberWithCommas(win)} ${slotCur}</span>` : ''}</div></div><div class="multiplier-badge ${multClass}">${xValText}</div></div>`;
        });

        container.innerHTML = listHTML;
        if (displayMode === 'bonusbuy' && activeIndex >= 2) {
            container.style.transform = `translateY(-${(activeIndex - 2) * 100}px)`;
            container.style.transition = "transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)";
        } else { container.style.transform = "none"; container.style.transition = "none"; }
    }

    function renderBattleMode(bData, globalIcons) {
        const rounds = bData.rounds ? Object.values(bData.rounds) : [];
        const activeIndex = bData.active_index !== undefined ? bData.active_index : 0;
        const displayMode = bData.display_mode || 'hunt';
        const curr = bData.currency || '₽';
        const sharedBalance = bData.start_balance || 0;

        document.getElementById('b-p1-name').innerText = bData.p1_name || 'Игрок 1';
        document.getElementById('b-p2-name').innerText = bData.p2_name || 'Игрок 2';

        let p1_opened_buy = 0, p1_opened_win = 0, p2_opened_buy = 0, p2_opened_win = 0, score1 = 0, score2 = 0;
        let openedTotalBuyAll = 0, openedTotalWinAll = 0; let openedCount = 0;

        rounds.forEach((r, idx) => {
            const b1 = Number(r.p1?.buy || 0); const w1 = Number(r.p1?.win || 0);
            const b2 = Number(r.p2?.buy || 0); const w2 = Number(r.p2?.win || 0);
            if (w1 > 0 || w2 > 0 || idx < activeIndex) {
                p1_opened_buy += b1; p1_opened_win += w1; p2_opened_buy += b2; p2_opened_win += w2;
                openedTotalBuyAll += (b1 + b2); openedTotalWinAll += (w1 + w2);
                if ((b1 > 0 ? w1/b1 : 0) > (b2 > 0 ? w2/b2 : 0)) score1++; else if ((b2 > 0 ? w2/b2 : 0) > (b1 > 0 ? w1/b1 : 0)) score2++;
                openedCount++;
            }
        });

        document.getElementById('b-score-p1').innerText = score1; document.getElementById('b-score-p2').innerText = score2;
        document.getElementById('b-stat-shared-depo').innerText = formatNumberCompact(sharedBalance) + ' ' + curr;
        document.getElementById('b-stat-shared-comeback').innerText = (openedTotalBuyAll > 0 ? (openedTotalWinAll / openedTotalBuyAll) : 0).toFixed(2) + 'x';
        document.getElementById('b-stat-shared-count').innerText = openedCount + '/' + rounds.length;

        document.getElementById('b-p1-meta').innerText = `⚖️ ${(p1_opened_buy > 0 ? p1_opened_win/p1_opened_buy : 0).toFixed(2)}x`;
        document.getElementById('b-p2-meta').innerText = `⚖️ ${(p2_opened_buy > 0 ? p2_opened_win/p2_opened_buy : 0).toFixed(2)}x`;

        // Жива смужка фракцій чату Kick
        const votes = bData.live_votes || { p1: 0, p2: 0 };
        const totalVotes = votes.p1 + votes.p2;
        let p1Percent = 50, p2Percent = 50;
        if (totalVotes > 0) {
            p1Percent = Math.round((votes.p1 / totalVotes) * 100);
            p2Percent = 100 - p1Percent;
        }
        document.getElementById('f-bar-p1').style.width = p1Percent + '%';
        document.getElementById('f-bar-p2').style.width = p2Percent + '%';
        document.getElementById('f-label-p1').innerText = `${p1Percent}% чата (!p1)`;
        document.getElementById('f-label-p2').innerText = `(!p2) ${p2Percent}% чата`;

        const crown1 = document.getElementById('crown-p1'); const crown2 = document.getElementById('crown-p2');
        crown1.style.display = score1 > score2 ? 'block' : 'none'; crown2.style.display = score2 > score1 ? 'block' : 'none';

        const viewport = document.getElementById('battle-viewport');
        viewport.style.display = rounds.length > 0 ? 'block' : 'none';
        document.getElementById('battle-stats-bar').style.display = rounds.length > 0 ? 'grid' : 'none';

        const container = document.getElementById('battle-slots-container'); if (!container) return;
        let roundsToRender = (displayMode === 'hunt') ? rounds.map((r,i)=>Object.assign({},r,{orig:i})).slice(-5) : rounds.map((r,i)=>Object.assign({},r,{orig:i}));
        let listHTML = '';

        roundsToRender.forEach((r) => {
            const isActive = r.orig === activeIndex;
            const b1 = Number(r.p1?.buy || 0); const w1 = Number(r.p1?.win || 0);
            const b2 = Number(r.p2?.buy || 0); const w2 = Number(r.p2?.win || 0);
            const x1 = b1 > 0 ? w1/b1 : 0; const x2 = b2 > 0 ? w2/b2 : 0;
            const isScored = r.orig < activeIndex || w1 > 0 || w2 > 0;

            let p1BG = '', p2BG = '';
            if (isScored) {
                if (x1 > x2) { p1BG = 'background: linear-gradient(90deg, rgba(46, 204, 113, 0.15) 0%, transparent 100%);'; p2BG = 'background: linear-gradient(270deg, rgba(231, 76, 60, 0.1) 0%, transparent 100%);'; }
                else if (x2 > x1) { p1BG = 'background: linear-gradient(90deg, rgba(231, 76, 60, 0.1) 0%, transparent 100%);'; p2BG = 'background: linear-gradient(270deg, rgba(46, 204, 113, 0.15) 0%, transparent 100%);'; }
            }

            listHTML += `
                <div class="battle-row" style="${isActive ? 'border: 1px solid rgba(124, 58, 237, 0.4); box-shadow: 0 10px 30px rgba(124,58,237,0.15);' : ''}">
                    <div class="b-side" style="${p1BG}">
                        <div class="slot-icon-wrapper" style="width:44px; height:44px; margin-right:12px;">${globalIcons[r.p1?.name] ? `<img class="slot-icon-img" src="${globalIcons[r.p1?.name]}">` : `<div class="slot-icon-text">${(r.p1?.name || '?').substring(0,2)}</div>`}</div>
                        <div class="slot-info">
                            <div class="slot-name" style="font-size:16px;">${r.p1?.name}</div>
                            <div class="slot-amounts" style="font-size:14px;">${formatNumberWithCommas(b1)} ${w1 > 0 ? `<span class="arrow-blue">➔</span> <span style="color:#2ecc71;">${formatNumberWithCommas(w1)}</span>` : ''}</div>
                        </div>
                        <div class="multiplier-badge ${w1 > 0 && x1 >= 1 ? 'mult-win' : (isScored ? 'mult-loss' : 'mult-pending')}" style="font-size:14px; min-width:70px; padding:6px 10px;">${w1 > 0 ? x1.toFixed(2)+'x' : (isScored ? '0.00x' : '—')}</div>
                    </div>
                    <div class="b-divider-vs">VS</div>
                    <div class="b-side b-side-p2" style="${p2BG}">
                        <div class="slot-icon-wrapper" style="width:44px; height:44px; margin-left:12px; margin-right:0;">${globalIcons[r.p2?.name] ? `<img class="slot-icon-img" src="${globalIcons[r.p2?.name]}">` : `<div class="slot-icon-text">${(r.p2?.name || '?').substring(0,2)}</div>`}</div>
                        <div class="slot-info">
                            <div class="slot-name" style="font-size:16px;">${r.p2?.name}</div>
                            <div class="slot-amounts" style="font-size:14px;">${w2 > 0 ? `<span style="color:#2ecc71;">${formatNumberWithCommas(w2)}</span> <span class="arrow-blue">⬅</span>` : ''} ${formatNumberWithCommas(b2)}</div>
                        </div>
                        <div class="multiplier-badge ${w2 > 0 && x2 >= 1 ? 'mult-win' : (isScored ? 'mult-loss' : 'mult-pending')}" style="font-size:14px; min-width:70px; padding:6px 10px; margin-left:0; margin-right:10px;">${w2 > 0 ? x2.toFixed(2)+'x' : (isScored ? '0.00x' : '—')}</div>
                    </div>
                </div>`;
        });

        container.innerHTML = listHTML;
        if (displayMode === 'bonusbuy' && activeIndex >= 2) {
            container.style.transform = `translateY(-${(activeIndex - 2) * 107}px)`;
            container.style.transition = "transform 0.4s cubic-bezier(0.16, 1, 0.3, 1)";
        } else { container.style.transform = "none"; container.style.transition = "none"; }
    }
</script>
</body>
</html>
