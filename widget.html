<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 10px; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; background: transparent; overflow: hidden; }
        
        .tracker-container { 
            width: 330px; height: fit-content; background: rgba(10, 10, 14, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 24px; padding: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.05); 
            border: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0; transition: margin-bottom 0.3s ease; }
        .tracker-container.has-items .stats-grid { margin-bottom: 14px; }
        
        .stat-card { background: rgba(25, 25, 35, 0.5); border-radius: 12px; padding: 8px 2px; text-align: center; border: 1px solid rgba(255,255,255,0.02); box-shadow: inset 0 1px 1px rgba(255,255,255,0.02); }
        .stat-icon { font-size: 13px; margin-bottom: 3px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .stat-val { font-size: 11px; font-weight: 800; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
        
        .slots-viewport { display: none; height: auto; max-height: 290px; overflow: hidden; position: relative; border-radius: 14px; }
        .slots-list { display: flex; flex-direction: column; gap: 7px; width: 100%; box-sizing: border-box; }
        
        .slot-row { display: flex; align-items: center; padding: 10px 12px; background: rgba(18, 18, 24, 0.6); border-radius: 14px; border: 1px solid rgba(255,255,255,0.01); box-sizing: border-box; height: 52px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* КОНТЕЙНЕР ДЛЯ ІКОНКИ ТА КОРОНИ */
        .slot-icon-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .slot-icon-img { width: 100%; height: 100%; border-radius: 8px; background: #222; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        
        .slot-icon-text { 
            width: 100%; height: 100%; border-radius: 8px; background: linear-gradient(135deg, #1a1a24, #111116); color: #ffb703; 
            border: 1px solid rgba(255, 183, 3, 0.15); display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.3); letter-spacing: 0.5px;
        }

        /* 🔥 СТИЛІЗАЦІЯ ДІАГОНАЛЬНОЇ КОРОНИ ЧЕМПІОНА */
        .crown-overlay { display: none; }
        .mode-finish .crown-overlay {
            display: block;
            position: absolute;
            top: -10px;
            left: -10px;
            font-size: 16px;
            transform: rotate(-28deg);
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.9)) drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
            z-index: 10;
            animation: crownPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes crownPop {
            0% { transform: scale(0) rotate(-60deg); opacity: 0; }
            100% { transform: scale(1) rotate(-28deg); opacity: 1; }
        }
        
        .slot-info { flex-grow: 1; min-width: 0; }
        .slot-name { font-size: 12px; font-weight: 700; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .slot-amounts { font-size: 11px; color: #64748b; font-weight: 500; margin-top: 1px; }
        .arrow-blue { color: #00f2fe; font-weight: bold; margin: 0 4px; filter: drop-shadow(0 0 4px rgba(0,242,254,0.4)); }
        
        .multiplier-badge { font-size: 11px; font-weight: 800; padding: 5px 8px; border-radius: 20px; min-width: 52px; text-align: center; box-sizing: border-box; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .mult-pending { background: rgba(30, 41, 59, 0.5); color: #94a3b8; border: 1px solid rgba(255,255,255,0.03); }
        .mult-loss { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .mult-win { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); filter: drop-shadow(0 0 6px rgba(16,185,129,0.15)); }
        
        .mode-bonusbuy .slot-row { opacity: 0.25; transform: scale(0.96); filter: blur(0.5px); }
        .mode-bonusbuy .slot-row.active { 
            opacity: 1; filter: none; background: linear-gradient(90deg, rgba(124, 58, 237, 0.16) 0%, rgba(18, 18, 24, 0.8) 100%); 
            border: 1px solid rgba(124, 58, 237, 0.3); transform: scale(1.03); box-shadow: 0 10px 25px rgba(124, 58, 237, 0.25);
        }
        .mode-bonusbuy .slot-row.active .slot-name { font-size: 12.5px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .mode-finish .slots-list { animation: infiniteWheel 18s linear infinite; }
        @keyframes infiniteWheel { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
    </style>
</head>
<body>

<div id="main-container" class="tracker-container">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">💰</span><span id="stat-total" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-icon">⭐</span><span id="stat-count" class="stat-val">0/0</span></div>
        <div class="stat-card"><span class="stat-icon">⚖️</span><span id="stat-avg" class="stat-val">0.00x</span></div>
        <div class="stat-card"><span class="stat-icon">🎯</span><span id="stat-max" class="stat-val">0.00x</span></div>
    </div>
    <div id="viewport" class="slots-viewport">
        <div id="slots-container" class="slots-list"></div>
    </div>
</div>

<script>
    // 🔒 ВИПРАВЛЕНИЙ ТА ПЕРЕВІРЕНИЙ КОНФІГ FIREBASE (З ЦИФРОЮ 0!)
    const firebaseConfig = {
        apiKey: "AIzaSyD5A81EQXjywE72h3zbqaqwNAUb08I7KNc",
        authDomain: "obswidget-110cf.firebaseapp.com",
        projectId: "obswidget-110cf",
        storageBucket: "obswidget-110cf.firebasestorage.app",
        messagingSenderId: "336642071325",
        appId: "1:336642071325:web:b985339f1f3ab75222dff4",
        measurementId: "G-Y2C8DRSYH1",
        databaseURL: "https://obswidget-110cf-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 🔥 ФУНКЦІЯ СКОРОЧЕННЯ ВЕЛИКИХ ЧИСЕЛ ДЛЯ ЕКРАНУ СТРІМА (400к, 1.5кк)
    function formatNumberCompact(num) {
        num = Number(num);
        if (isNaN(num) || num === 0) return '0';
        if (num >= 1000000) {
            let val = num / 1000000;
            return parseFloat(val.toFixed(2)) + 'кк';
        }
        if (num >= 1000) {
            let val = num / 1000;
            return parseFloat(val.toFixed(2)) + 'к';
        }
        return num.toString();
    }

    // Слухаємо базу даних у реальному часі
    db.ref('/').on('value', snapshot => {
        const data = snapshot.val() || {};
        const slots = data.slots ? Object.values(data.slots) : [];
        const activeIndex = data.active_index ?? 0;
        const displayMode = data.display_mode || 'hunt';
        const startBalance = data.start_balance ?? 0;
        const balanceCurr = data.start_balance_currency || '$';
        const customIcons = data.custom_icons || {};

        // Оновлюємо колір рамки контейнера, якщо твій дизайн це підтримував
        const widgetContainer = document.getElementById('widget');
        if (widgetContainer) {
            if (displayMode === 'bonusbuy') widgetContainer.style.borderColor = '#9b59b6';
            else if (displayMode === 'finish') widgetContainer.style.borderColor = '#2ecc71';
            else widgetContainer.style.borderColor = '#3498db';
        }

        // Рахуємо загальний виграш сесії
        let totalWin = 0;
        slots.forEach(s => { totalWin += Number(s.win || 0); });

        // 🔥 ВИВЕДЕННЯ ФІНАНСІВ СТРІМА В КОМПАКТНОМУ ФОРМАТІ
        const totalWinEl = document.getElementById('widget-total-win');
        const depositEl = document.getElementById('widget-deposit');
        if (totalWinEl) totalWinEl.innerText = formatNumberCompact(totalWin) + ' ' + balanceCurr;
        if (depositEl) depositEl.innerText = formatNumberCompact(startBalance) + ' ' + balanceCurr;

        // Фільтруємо чергу відповідно до обраного модератором режиму OBS
        let slotsToRender = [];
        if (displayMode === 'hunt') {
            slotsToRender = slots.map((s, idx) => ({...s, originalIndex: idx})).slice(-5);
        } else {
            slotsToRender = slots.map((s, idx) => ({...s, originalIndex: idx}));
        }

        const container = document.getElementById('widget-slots-container');
        if (!container) return;
        container.innerHTML = '';

        if (slotsToRender.length === 0) {
            container.innerHTML = `<div style="text-align:center; color:#666; font-size:12px; padding:20px;">Очередь пуста</div>`;
            return;
        }

        // Рендеримо рядки за твоїм оригінальним шаблоном
        slotsToRender.forEach(slot => {
            const isActive = slot.originalIndex === activeIndex;
            const slotCur = slot.currency || '$';
            
            // Розрахунок іксів
            let xHTML = '';
            if (slot.win > 0 && slot.buy > 0) {
                const xVal = (slot.win / slot.buy).toFixed(1);
                xHTML = `<div class="slot-x-val win-x">${xVal}x</div>`;
            } else if (slot.win === 0 && !isActive) {
                xHTML = `<div class="slot-x-val loss-x">0x</div>`;
            } else {
                xHTML = `<div class="slot-x-val">—</div>`;
            }

            // Рендер іконки
            let iconHTML = `<div class="slot-icon-frame">?</div>`;
            if (customIcons[slot.name]) {
                iconHTML = `<div class="slot-icon-frame"><img class="slot-icon-img" src="${customIcons[slot.name]}"></div>`;
            } else if (slot.name && slot.name.length > 0) {
                iconHTML = `<div class="slot-icon-frame">${slot.name.charAt(0).toUpperCase()}</div>`;
            }

            // 🔥 СТИСКАННЯ ЧИСЕЛ ДЛЯ КОНКРЕТНОГО РЯДКА (Покупка та Виграш)
            const buyFormatted = formatNumberCompact(slot.buy);
            const winFormatted = slot.win > 0 ? ` ➔ <span style="color:#2ecc71; font-weight:bold;">${formatNumberCompact(slot.win)}${slotCur}</span>` : '';

            // Генерируємо HTML рядок з твоїми оригінальними класами дизайну
            container.innerHTML += `
                <div class="slot-row ${isActive ? 'active-slot' : ''}">
                    ${iconHTML}
                    <div class="slot-info">
                        <span class="slot-name">${slot.name}</span>
                        <span class="slot-math">${buyFormatted}${slotCur}${winFormatted}</span>
                    </div>
                    ${xHTML}
                </div>
            `;
        });
    });
</script>
</body>
</html>
