<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 10px; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; background: transparent; overflow: hidden; }
        
        .tracker-container { 
            width: 330px; height: fit-content; background: rgba(10, 10, 14, 0.85); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            border-radius: 24px; padding: 14px; box-shadow: 0 20px 50px rgba(0,0,0,0.6), inset 0 1px 2px rgba(255,255,255,0.05); 
            border: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; box-sizing: border-box; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-bottom: 0; transition: margin-bottom 0.3s ease; }
        .tracker-container.has-items .stats-grid { margin-bottom: 14px; }
        
        .stat-card { background: rgba(25, 25, 35, 0.5); border-radius: 12px; padding: 8px 2px; text-align: center; border: 1px solid rgba(255,255,255,0.02); box-shadow: inset 0 1px 1px rgba(255,255,255,0.02); }
        .stat-icon { font-size: 13px; margin-bottom: 3px; display: block; filter: drop-shadow(0 2px 4px rgba(0,0,0,0.5)); }
        .stat-val { font-size: 11px; font-weight: 800; color: #e2e8f0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing: -0.2px; }
        
        .slots-viewport { display: none; height: auto; max-height: 290px; overflow: hidden; position: relative; border-radius: 14px; }
        .slots-list { display: flex; flex-direction: column; gap: 7px; width: 100%; box-sizing: border-box; }
        
        .slot-row { display: flex; align-items: center; padding: 10px 12px; background: rgba(18, 18, 24, 0.6); border-radius: 14px; border: 1px solid rgba(255,255,255,0.01); box-sizing: border-box; height: 52px; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* КОНТЕЙНЕР ДЛЯ ІКОНКИ ТА КОРОНИ */
        .slot-icon-wrapper {
            position: relative;
            width: 32px;
            height: 32px;
            margin-right: 12px;
            flex-shrink: 0;
        }
        .slot-icon-img { width: 100%; height: 100%; border-radius: 8px; background: #222; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        
        .slot-icon-text { 
            width: 100%; height: 100%; border-radius: 8px; background: linear-gradient(135deg, #1a1a24, #111116); color: #ffb703; 
            border: 1px solid rgba(255, 183, 3, 0.15); display: flex; align-items: center; justify-content: center; 
            font-size: 10px; font-weight: 800; text-transform: uppercase; box-sizing: border-box; box-shadow: 0 4px 10px rgba(0,0,0,0.3); letter-spacing: 0.5px;
        }

        /* 🔥 СТИЛІЗАЦІЯ ДІАГОНАЛЬНОЇ КОРОНИ ЧЕМПІОНА */
        .crown-overlay { display: none; }
        .mode-finish .crown-overlay {
            display: block;
            position: absolute;
            top: -10px;
            left: -10px;
            font-size: 16px;
            transform: rotate(-28deg);
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.9)) drop-shadow(0 0 4px rgba(255, 215, 0, 0.5));
            z-index: 10;
            animation: crownPop 0.45s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
        }
        @keyframes crownPop {
            0% { transform: scale(0) rotate(-60deg); opacity: 0; }
            100% { transform: scale(1) rotate(-28deg); opacity: 1; }
        }
        
        .slot-info { flex-grow: 1; min-width: 0; }
        .slot-name { font-size: 12px; font-weight: 700; color: #f1f5f9; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .slot-amounts { font-size: 11px; color: #64748b; font-weight: 500; margin-top: 1px; }
        .arrow-blue { color: #00f2fe; font-weight: bold; margin: 0 4px; filter: drop-shadow(0 0 4px rgba(0,242,254,0.4)); }
        
        .multiplier-badge { font-size: 11px; font-weight: 800; padding: 5px 8px; border-radius: 20px; min-width: 52px; text-align: center; box-sizing: border-box; box-shadow: 0 2px 6px rgba(0,0,0,0.2); }
        .mult-pending { background: rgba(30, 41, 59, 0.5); color: #94a3b8; border: 1px solid rgba(255,255,255,0.03); }
        .mult-loss { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .mult-win { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); filter: drop-shadow(0 0 6px rgba(16,185,129,0.15)); }
        
        .mode-bonusbuy .slot-row { opacity: 0.25; transform: scale(0.96); filter: blur(0.5px); }
        .mode-bonusbuy .slot-row.active { 
            opacity: 1; filter: none; background: linear-gradient(90deg, rgba(124, 58, 237, 0.16) 0%, rgba(18, 18, 24, 0.8) 100%); 
            border: 1px solid rgba(124, 58, 237, 0.3); transform: scale(1.03); box-shadow: 0 10px 25px rgba(124, 58, 237, 0.25);
        }
        .mode-bonusbuy .slot-row.active .slot-name { font-size: 12.5px; font-weight: 800; color: #fff; text-shadow: 0 0 10px rgba(255,255,255,0.2); }
        
        .mode-finish .slots-list { animation: infiniteWheel 18s linear infinite; }
        @keyframes infiniteWheel { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
    </style>
</head>
<body>

<div id="main-container" class="tracker-container">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">💰</span><span id="stat-total" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-icon">⭐</span><span id="stat-count" class="stat-val">0/0</span></div>
        <div class="stat-card"><span class="stat-icon">⚖️</span><span id="stat-avg" class="stat-val">0.00x</span></div>
        <div class="stat-card"><span class="stat-icon">🎯</span><span id="stat-max" class="stat-val">0.00x</span></div>
    </div>
    <div id="viewport" class="slots-viewport">
        <div id="slots-container" class="slots-list"></div>
    </div>
</div>

<script>
    const USD_TO_RUB_RATE = 90; 

    const firebaseConfig = {
        apiKey: "AIzaSyD5A81EQXjywE72h3zbqaqwNAUb08I7KNc",
        authDomain: "obswidget-110cf.firebaseapp.com",
        projectId: "obswidget-110cf",
        storageBucket: "obswidget-110cf.firebasestorage.app",
        messagingSenderId: "336642071325",
        appId: "1:336642071325:web:b985339f1f3ab75222dff4",
        measurementId: "G-Y2C8DRSYH1",
        databaseURL: "https://obswidget-110cf-default-rtdb.europe-west1.firebasedatabase.app/"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function convertCurrency(amount, fromCurr, toCurr) {
        if (fromCurr === toCurr) return amount;
        if (toCurr === '₽' && fromCurr === '$') return amount * USD_TO_RUB_RATE;
        if (toCurr === '$' && fromCurr === '₽') return amount / USD_TO_RUB_RATE;
        return amount;
    }

    function generateAbbreviation(name) {
        if (!name) return '🎰';
        let clean = name.replace(/[^a-zA-Z0-9а-яА-ЯіІїЇєЄґҐ\s]/g, '');
        let words = clean.split(/\s+/).filter(w => w.length > 0);
        if (words.length === 0) return '🎰';
        if (words.length === 1) return words[0].substring(0, 2).toUpperCase();
        let filtered = words.filter(w => !['the', 'of', 'in', 'a', 'vs', 'to', 'and'].includes(w.toLowerCase()));
        if (filtered.length === 0) filtered = words;
        return filtered.map(w => w[0]).join('').substring(0, 2).toUpperCase();
    }

    db.ref('/').on('value', (snapshot) => {
        const data = snapshot.val() || {};
        const slots = data.slots ? Object.values(data.slots) : [];
        const activeIdx = data.active_index ?? 0;
        const mode = data.display_mode || 'hunt';
        const startBalance = Number(data.start_balance || 0);
        const startBalanceCurr = data.start_balance_currency || '$';
        const cloudCustomIcons = data.custom_icons || {};

        const mainContainer = document.getElementById('main-container');
        const viewport = document.getElementById('viewport');
        const container = document.getElementById('slots-container');
        container.innerHTML = '';

        if (slots.length === 0) {
            mainContainer.classList.remove('has-items'); viewport.style.display = 'none';
        } else {
            mainContainer.classList.add('has-items'); viewport.style.display = 'block'; viewport.className = "slots-viewport mode-" + mode;
        }

        let totalSpentInBalanceCurrency = 0;
        let completedWinInBalanceCurrency = 0;
        let remainingSpentInBalanceCurrency = 0;
        let completedCount = 0, totalX = 0;
        
        // 🔥 ВИЗНАЧЕННЯ НАЙБІЛЬШОГО ІКСУ СЕРЕД ВСІХ СЛОТІВ
        let maxSessionX = 0;
        slots.forEach(s => {
            const buyAmt = Number(s.buy || 0);
            const winAmt = Number(s.win || 0);
            if (buyAmt > 0 && winAmt > 0) {
                const currentX = winAmt / buyAmt;
                if (currentX > maxSessionX) { maxSessionX = currentX; }
            }
        });

        slots.forEach((s, idx) => {
            const buyAmt = Number(s.buy || 0); const winAmt = Number(s.win || 0);
            const slotCurrency = s.currency || '$';

            const buyInBalanceCurr = convertCurrency(buyAmt, slotCurrency, startBalanceCurr);
            const winInBalanceCurr = convertCurrency(winAmt, slotCurrency, startBalanceCurr);

            totalSpentInBalanceCurrency += buyInBalanceCurr;

            const isCompleted = idx < activeIdx || (idx === activeIdx && winAmt > 0);

            if (isCompleted) {
                completedWinInBalanceCurrency += winInBalanceCurr;
                completedCount++;
                totalX += (buyAmt > 0 ? winAmt / buyAmt : 0);
            } else {
                remainingSpentInBalanceCurrency += buyInBalanceCurr;
            }
        });

        let neededXText = '0.00x';
        if (remainingSpentInBalanceCurrency > 0) {
            let neededX = (startBalance - completedWinInBalanceCurrency) / remainingSpentInBalanceCurrency;
            neededXText = neededX <= 0 ? '—' : neededX.toFixed(2) + 'x';
        } else {
            if (completedWinInBalanceCurrency >= startBalance) {
                neededXText = '—';
            } else if (totalSpentInBalanceCurrency > 0) {
                let finalX = (completedWinInBalanceCurrency / totalSpentInBalanceCurrency);
                neededXText = finalX.toFixed(2) + 'x';
            }
        }
        
        let avgX = completedCount > 0 ? (totalX / completedCount) : 0;

        function createRowHTML(slot, index, isForceActive = false) {
            const isActive = isForceActive || index === activeIdx;
            let multText = '—', badgeClass = 'mult-pending'; const slotCurrency = slot.currency || '$';
            
            const slotBuy = Number(slot.buy || 0);
            const slotWin = Number(slot.win || 0);
            const currentSlotX = slotBuy > 0 ? (slotWin / slotBuy) : 0;

            // Перевіряємо, чи є цей конкретний слот лідером за коефіцієнтом
            const isKingSlot = maxSessionX > 0 && Math.abs(currentSlotX - maxSessionX) < 0.0001;

            if (index < activeIdx || (index === activeIdx && slot.win > 0)) {
                multText = currentSlotX.toFixed(2) + 'x'; badgeClass = currentSlotX >= 1 ? 'mult-win' : 'mult-loss';
            }

            let amountHTML = slot.buy + ' ' + slotCurrency;
            if (isActive) amountHTML += ` <span class="arrow-blue">➡</span> ` + (slot.win || 0) + ' ' + slotCurrency;
            else if (index < activeIdx) amountHTML += ` → ` + slot.win + ' ' + slotCurrency;

            let iconRenderHTML = '';
            const slotNameTrim = (slot.name || "").trim();
            const chosenIcon = cloudCustomIcons[slotNameTrim];

            if (chosenIcon && chosenIcon.startsWith('data:image')) {
                iconRenderHTML = `<img class="slot-icon-img" src="${chosenIcon}">`;
            } else {
                const abbrText = generateAbbreviation(slot.name);
                iconRenderHTML = `<div class="slot-icon-text">${abbrText}</div>`;
            }

            // Додаємо HTML корони, якщо це топ-слот
            const crownHTML = isKingSlot ? `<div class="crown-overlay">👑</div>` : '';

            return `
                <div class="slot-row ${isActive ? 'active' : ''}">
                    <div class="slot-icon-wrapper">
                        ${iconRenderHTML}
                        ${crownHTML}
                    </div>
                    <div class="slot-info">
                        <div class="slot-name">${slot.name}</div>
                        <div class="slot-amounts">${amountHTML}</div>
                    </div>
                    <div class="multiplier-badge ${badgeClass}">${multText}</div>
                </div>`;
        }
        
        if (slots.length > 0) {
            if (mode === 'hunt') {
                const startIdx = Math.max(0, slots.length - 5); slots.slice(startIdx).forEach((slot, i) => { container.innerHTML += createRowHTML(slot, startIdx + i); });
            } else if (mode === 'bonusbuy') {
                let startIdx = Math.max(0, Math.min(slots.length - 5, activeIdx - 2)); slots.slice(startIdx, startIdx + 5).forEach((slot, i) => { container.innerHTML += createRowHTML(slot, startIdx + i); });
            } else if (mode === 'finish') {
                slots.forEach((slot, i) => { container.innerHTML += createRowHTML(slot, i, false); }); slots.forEach((slot, i) => { container.innerHTML += createRowHTML(slot, i, false); }); container.style.animationDuration = Math.max(6, slots.length * 1.5) + "s";
            }
        }

        document.getElementById('stat-total').innerText = (startBalance || 0) + ' ' + startBalanceCurr;
        document.getElementById('stat-count').innerText = `${slots.length > 0 ? activeIdx + 1 : 0}/${slots.length}`;
        document.getElementById('stat-avg').innerText = neededXText;
        document.getElementById('stat-max').innerText = avgX.toFixed(2) + 'x';
    });
</script>
</body>
</html>
