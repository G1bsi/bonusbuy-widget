<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800;900&display=swap" rel="stylesheet">
    <style>
        body { margin: 0; padding: 15px; font-family: 'Plus Jakarta Sans', sans-serif; color: #fff; background: transparent; overflow: hidden; }
        .tracker-container { margin: 0 auto; width: 580px; height: auto; min-height: 100px; background: rgba(10, 10, 14, 0.98); backdrop-filter: blur(8px); border-radius: 36px; padding: 24px; box-shadow: 0 35px 85px rgba(0,0,0,0.6), inset 0 1px 3px rgba(255,255,255,0.05); border: 1px solid rgba(255, 255, 255, 0.03); display: flex; flex-direction: column; box-sizing: border-box; transition: width 0.4s ease; }
        .slots-viewport { max-height: 488px; overflow: hidden; position: relative; border-radius: 24px; padding: 15px; margin: -15px; transition: max-height 0.4s ease; }
        .slots-list { display: flex; flex-direction: column; gap: 12px; width: 100%; box-sizing: border-box; transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        @keyframes infiniteWheel { 0% { transform: translateY(0); } 100% { transform: translateY(-50%); } }
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 0; transition: margin-bottom 0.3s ease; }
        .tracker-container.has-items .stats-grid { margin-bottom: 24px; }
        .stat-card { background: rgba(25, 25, 35, 0.8); border-radius: 18px; padding: 14px 6px; text-align: center; border: 1px solid rgba(255,255,255,0.02); }
        .stat-icon { font-size: 22px; margin-bottom: 6px; display: block; }
        .stat-val { font-size: 18px; font-weight: 800; color: #e2e8f0; }
        .slot-row { display: flex; align-items: center; padding: 18px 22px; background: rgba(18, 18, 24, 0.85); border-radius: 24px; border: 1px solid rgba(255,255,255,0.01); box-sizing: border-box; height: 88px; transition: all 0.4s; flex-shrink: 0; }
        .slot-icon-wrapper { position: relative; width: 55px; height: 55px; margin-right: 20px; flex-shrink: 0; }
        .slot-icon-img { width: 100%; height: 100%; border-radius: 14px; object-fit: cover; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .slot-icon-text { width: 100%; height: 100%; border-radius: 14px; background: linear-gradient(135deg, #1a1a24, #111116); color: #ffb703; display: flex; align-items: center; justify-content: center; font-weight: 800; }
        .crown-overlay { display: none; }
        .mode-finish .crown-overlay { display: block; position: absolute; top: -16px; left: -16px; font-size: 28px; transform: rotate(-28deg); filter: drop-shadow(0 3px 8px rgba(0,0,0,0.9)); z-index: 10; animation: crownPop 0.45s both; }
        @keyframes crownPop { 0% { transform: scale(0) rotate(-60deg); opacity: 0; } 100% { transform: scale(1) rotate(-28deg); opacity: 1; } }
        .slot-info { flex-grow: 1; min-width: 0; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 10px; gap: 1px; }
        .slot-name-row { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-bottom: 0; width: 100%; }
        .slot-name { font-size: 22px; font-weight: 800; color: #f1f5f9; white-space: nowrap; overflow: visible; line-height: 1.1; margin: 0; }
        .slot-amounts { font-size: 20px; color: #8a95a3; font-weight: 600; display: flex; align-items: center; justify-content: flex-start; gap: 6px; margin-top: 0; white-space: nowrap; }
        .arrow-blue { color: #00f2fe; font-weight: bold; margin: 0 4px; filter: drop-shadow(0 0 6px rgba(0,242,254,0.4)); }
        .multiplier-badge { flex-shrink: 0; font-size: 18px; font-weight: 800; padding: 6px 14px; margin: 0; border-radius: 30px; min-width: 75px; text-align: center; align-self: center; }
        .mult-win { background: rgba(16, 185, 129, 0.12); color: #34d399; border: 1px solid rgba(16, 185, 129, 0.2); }
        .mult-loss { background: rgba(239, 68, 68, 0.12); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); }
        .mult-pending { background: rgba(15, 15, 20, 0.95); color: #4a5568; border: 1px solid rgba(255,255,255,0.04); min-width: 55px; }
        .best-x-badge { flex-shrink: 0; font-size: 15px; font-weight: 900; padding: 5px 12px; border-radius: 30px; text-align: center; background: rgba(255,183,3,0.15); color: #ffb703; border: 1px solid rgba(255,183,3,0.45); margin-left: 8px; white-space: nowrap; }
        .b-side.best-x-winner { background: rgba(255,183,3,0.13); border: 1px solid rgba(255,183,3,0.45); box-shadow: inset 0 0 18px rgba(255,183,3,0.08); }
        .b-side.best-x-winner .slot-name { color: #ffb703; }
        .battle-shared-stats { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .b-stat-pill { background: rgba(25, 25, 35, 0.8); border: 1px solid rgba(255,255,255,0.05); padding: 8px 16px; border-radius: 16px; font-size: 16px; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .battle-header { display: flex; align-items: center; justify-content: space-around; margin-bottom: 20px; background: rgba(18, 18, 24, 0.6); border-radius: 20px; padding: 16px 18px; border: 1px solid rgba(255,255,255,0.02); gap: 15px; }
        .battle-player-block { display: flex; flex-direction: column; position: relative; flex: 1; text-align: center; align-items: center; min-width: 0; }
        .b-name { font-size: 30px; font-weight: 900; color: #3498db; white-space: nowrap; overflow: visible; width: auto; letter-spacing: 0.5px; line-height: 1.1; margin-bottom: 2px; }
        .b-meta { font-size: 13px; color: #a4a4af; margin-top: 4px; font-weight: 700; }
        .b-score-box { margin-top: 10px; background: rgba(255,183,3,0.1); border: 1px solid rgba(255,183,3,0.3); color: #ffb703; font-size: 26px; font-weight: 900; padding: 4px 18px; border-radius: 14px; box-shadow: 0 4px 15px rgba(255,183,3,0.15); }
        .battle-row { display: flex; align-items: center; justify-content: space-between; background: rgba(18, 18, 24, 0.85); border-radius: 20px; border: 1px solid rgba(255,255,255,0.02); padding: 0 15px; box-sizing: border-box; flex-shrink: 0; position: relative; overflow: hidden; transition: all 0.3s; height: 88px; }
        .b-side { flex: 1; display: flex; align-items: center; min-width: 0; position: relative; z-index: 2; padding: 8px; border-radius: 16px; transition: 0.3s; }
        .b-side.winner { background: rgba(46, 204, 113, 0.12); border: 1px solid rgba(46,204,113,0.35); box-shadow: inset 0 0 15px rgba(46,204,113,0.1); }
        .b-name-wrap { position: relative; display: inline-block; max-width: 100%; }
        .b-crown-diagonal { display: none; position: absolute; top: -14px; left: -10px; font-size: 22px; transform: rotate(-30deg); filter: drop-shadow(0 2px 6px rgba(0,0,0,0.9)); z-index: 5; animation: crownPopName 0.5s both; pointer-events: none; }
        @keyframes crownPopName { 0% { transform: scale(0) rotate(-70deg); opacity: 0; } 100% { transform: scale(1) rotate(-30deg); opacity: 1; } }
        .winner-block .b-crown-diagonal { display: block; }
        .winner-block .b-name { color: #ffb703 !important; text-shadow: 0 0 12px rgba(255,183,3,0.6), 0 0 28px rgba(255,183,3,0.35); animation: nameGlow 1.8s ease-in-out infinite; }
        @keyframes nameGlow { 0%,100% { text-shadow: 0 0 12px rgba(255,183,3,0.6), 0 0 28px rgba(255,183,3,0.35); } 50% { text-shadow: 0 0 20px rgba(255,183,3,0.95), 0 0 45px rgba(255,183,3,0.6); } }
        .b-vs-text { font-size: 14px; font-weight: 900; color: rgba(255,255,255,0.2); margin: 0 10px; flex-shrink: 0; z-index: 2; }
        .b-side .slot-icon-wrapper { width: 44px; height: 44px; flex-shrink: 0; margin-right: 12px; }
        .b-side .slot-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: flex-end; padding-bottom: 8px; gap: 0px; }
        .b-side .slot-name-row { display: flex; justify-content: space-between; align-items: flex-start; gap: 6px; margin-bottom: 4px; width: 100%; }
        .b-side .slot-name { font-size: 14.5px; font-weight: 800; color: #f1f5f9; white-space: nowrap; overflow: visible; line-height: 1.1; margin: 0; }
        .b-side .multiplier-badge { flex-shrink: 0; font-size: 12.5px; min-width: 45px; padding: 2px 6px; margin: 0; border-radius: 8px; text-align: center; }
        .b-side .slot-amounts { font-size: 13.5px; color: #64748b; font-weight: 700; display: flex; align-items: center; gap: 4px; white-space: nowrap; }

        /* ═══════════════════════════════════════
           WHEEL BANNER — повністю новий дизайн
        ═══════════════════════════════════════ */
        .wheel-banner {
            margin: 14px auto 0 auto;
            width: 580px;
            height: 140px;
            box-sizing: border-box;
            display: none;
            position: relative;
            border-radius: 28px;
            overflow: hidden;
            animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            background:
                repeating-linear-gradient(
                    130deg,
                    rgba(0,210,200,0.03) 0px,
                    rgba(0,210,200,0.03) 1px,
                    transparent 1px,
                    transparent 18px
                ),
                repeating-linear-gradient(
                    45deg,
                    rgba(255,255,255,0.01) 0px,
                    rgba(255,255,255,0.01) 1px,
                    transparent 1px,
                    transparent 22px
                ),
                linear-gradient(135deg, #0d0d11 0%, #14121a 50%, #0d0d11 100%);
            border: 1px solid rgba(0,210,200,0.22);
            box-shadow:
                0 0 0 1px rgba(0,210,200,0.08),
                0 20px 60px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(0,210,200,0.15),
                inset 0 -1px 0 rgba(0,0,0,0.5);
        }
        @keyframes slideUp { from { transform: translateY(18px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        /* Велике фонове колесо — займає ліву половину банера */
        .wheel-bg {
            position: absolute;
            left: -40px;
            top: 50%;
            transform: translateY(-50%);
            width: 260px;
            height: 260px;
            opacity: 0.13;
            pointer-events: none;
            z-index: 0;
        }
        .wheel-bg svg {
            width: 100%;
            height: 100%;
            animation: spinWheel 55s linear infinite;
            filter: drop-shadow(0 0 18px rgba(0,210,200,0.25));
        }

        /* Темний оверлей зліва щоб затемнити колесо */
        .wheel-bg-overlay {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            width: 290px;
            background: linear-gradient(90deg, rgba(10,10,14,0.55) 0%, rgba(10,10,14,0.2) 70%, transparent 100%);
            z-index: 1;
            pointer-events: none;
        }

        /* Маленький значок колеса у лівому блоці */
        @keyframes spinWheel {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* Центральний текстовий блок — на весь банер */
        .wheel-banner-center {
            position: absolute;
            left: 0; right: 0; top: 0; bottom: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            z-index: 2;
            box-sizing: border-box;
        }
        .wb-title {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(0,210,200,1);
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            text-shadow: 0 0 22px rgba(0,210,200,0.5);
            flex-shrink: 0;
            transition: color 0.5s, text-shadow 0.5s;
        }
        

        @keyframes marquee-loop {
            0%   { transform: translateX(0); }
            100% { transform: translateX(var(--scroll-dist)); }
        }
        .slot-name-marquee {
            overflow: hidden;
            flex: 1;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding-bottom: 3px;
            margin-bottom: -3px;
        }
        .slot-name-marquee .slot-name {
            display: inline-block;
            white-space: nowrap;
        }
        .slot-name-marquee .slot-name.do-marquee,
        .slot-name-marquee .marquee-dupe.do-marquee {
            animation: marquee-loop var(--marquee-dur, 18s) linear infinite;
        }
        .b-name-marquee {
            overflow: hidden;
            width: 100%;
            position: relative;
            display: flex;
            align-items: flex-end;
            padding-bottom: 3px;
            margin-bottom: -3px;
        }
        .b-name-marquee .b-name {
            display: inline-block;
            white-space: nowrap !important;
            overflow: visible !important;
            width: auto !important;
        }
        .b-name-marquee .b-name.do-marquee,
        .b-name-marquee .marquee-dupe.do-marquee {
            animation: marquee-loop var(--marquee-dur, 18s) linear infinite;
        }
        .wb-grid {
            display: flex;
            gap: 8px;
            align-items: stretch;
            width: 100%;
            flex-shrink: 0;
        }
        .wb-card {
            flex: 1;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 12px;
            padding: 6px 10px;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }
        .wb-card.wb-gold {
            background: rgba(0,210,200,0.09);
            border-color: rgba(0,210,200,0.35);
            box-shadow: inset 0 0 18px rgba(0,210,200,0.08);
        }
        .wb-label {
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
        }
        .wb-card.wb-gold .wb-label { color: rgba(0,210,200,1); }
        .wb-val {
            font-size: 24px;
            font-weight: 900;
            color: #fff;
            white-space: nowrap;
            line-height: 1;
        }
        .wb-card.wb-gold .wb-val {
            color: #00d2c8;
            text-shadow: 0 0 14px rgba(0,210,200,0.6);
        }
        /* ── INACTIVE state — placed AFTER gold rules to win cascade ── */
        .wheel-banner.inactive {
            background:
                repeating-linear-gradient(130deg, rgba(200,40,40,0.05) 0px, rgba(200,40,40,0.05) 1px, transparent 1px, transparent 18px),
                repeating-linear-gradient(45deg, rgba(255,255,255,0.01) 0px, rgba(255,255,255,0.01) 1px, transparent 1px, transparent 22px),
                linear-gradient(135deg, #110808 0%, #1a0e0e 50%, #110808 100%) !important;
            border-color: rgba(210,50,50,0.35) !important;
            box-shadow: 0 0 0 1px rgba(210,50,50,0.12), 0 20px 60px rgba(0,0,0,0.7), inset 0 1px 0 rgba(210,50,50,0.2), inset 0 -1px 0 rgba(0,0,0,0.5) !important;
        }
        .wheel-banner.inactive .wb-title {
            color: rgba(230,65,65,1) !important;
            text-shadow: 0 0 22px rgba(210,40,40,0.65) !important;
        }
        .wheel-banner.inactive .wb-card,
        .wheel-banner.inactive .wb-card.wb-gold {
            background: rgba(200,40,40,0.06) !important;
            border-color: rgba(200,50,50,0.25) !important;
            box-shadow: none !important;
        }
        .wheel-banner.inactive .wb-label,
        .wheel-banner.inactive .wb-card.wb-gold .wb-label {
            color: rgba(210,90,90,0.75) !important;
        }
        .wheel-banner.inactive .wb-val,
        .wheel-banner.inactive .wb-card.wb-gold .wb-val {
            color: rgba(215,95,95,1) !important;
            text-shadow: 0 0 10px rgba(200,40,40,0.4) !important;
        }
        .wheel-banner.inactive .wb-link {
            color: rgba(200,80,80,0.6) !important;
        }
        .wb-link {
            font-size: 13px;
            font-weight: 900;
            letter-spacing: 2px;
            color: rgba(0,210,200,0.8);
            text-transform: uppercase;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            flex-shrink: 0;
        }
    </style>
</head>
<body>
<div id="solo-container" class="tracker-container" style="display: none;">
    <div class="stats-grid">
        <div class="stat-card"><span class="stat-icon">💰</span><span id="stat-total" class="stat-val">0</span></div>
        <div class="stat-card"><span class="stat-icon">⭐</span><span id="stat-count" class="stat-val">0/0</span></div>

</div>

<div id="wheel-banner" class="wheel-banner">

    <!-- Темний оверлей для затемнення колеса -->
    <div class="wheel-bg-overlay"></div>

    <!-- Центральний контент -->
    <div class="wheel-banner-center">
        <div class="wb-title" id="wb-title">🎡 СТАТУС КОЛЕСА: АКТИВНО</div>
        <div class="wb-grid">
            <div class="wb-card">
                <span class="wb-label">МИН. ДЕПОЗИТ</span>
                <span class="wb-val" id="wb-val-dep">—</span>
            </div>
            <div class="wb-card wb-gold">
                <span class="wb-label">СУММА КОЛЕСА</span>
                <span class="wb-val" id="wb-val-amount">—</span>
            </div>
            <div class="wb-card">
                <span class="wb-label">ПОБЕДИТЕЛИ</span>
                <span class="wb-val" id="wb-val-winners">—</span>
            </div>
        </div>
        <div class="wb-link">🔗 УЧАСТВУЙ ПО ССЫЛКЕ В ЗАКРЕПЕ</div>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC3WVO3p4EwDec5J2PEooIoAkHxIfw6R8w",
        authDomain: "bonusbyra.firebaseapp.com",
        databaseURL: "https://bonusbyra-default-rtdb.europe-west1.firebasedatabase.app/",
        projectId: "bonusbyra",
        storageBucket: "bonusbyra.firebasestorage.app",
        messagingSenderId: "873732272758",
        appId: "1:873732272758:web:b71eb5ac35ea6b6bc26557"
    };
    firebase.initializeApp(firebaseConfig); 
    const db = firebase.database();
    
    function formatNumberCompact(num) { num = Number(num); if (isNaN(num) || num === 0) return '0'; let absNum = Math.abs(num); let sign = num < 0 ? '-' : ''; if (absNum >= 1000000) return sign + parseFloat((absNum / 1000000).toFixed(2)) + 'кк'; if (absNum >= 1000) return sign + parseFloat((absNum / 1000).toFixed(1)) + 'к'; return sign + absNum.toString(); }
    function formatNumberWithCommas(num) { return Number(num).toLocaleString('en-US').replace(/,/g, ' '); }
    
    db.ref('/').on('value', function(snapshot) {
        const data = snapshot.val() || {};
        const mode = data.global_mode || 'solo';
        const mainVisible = !!data.main_widget_visible;

        if (!mainVisible) {
            document.getElementById('solo-container').style.display = 'none';
            document.getElementById('battle-container').style.display = 'none';
        } else if (mode === 'solo') {
            document.getElementById('solo-container').style.display = 'flex';
            document.getElementById('battle-container').style.display = 'none';
            renderSoloMode(data);
        } else {
            document.getElementById('solo-container').style.display = 'none';
            document.getElementById('battle-container').style.display = 'flex';
            renderBattleMode(data.battle || {}, data.custom_icons || {});
        }
        
        // КОЛЕСО — показуємо завжди (якщо wheel_visible), але з двома станами
        const wheel = data.wheel || {};
        const banner = document.getElementById('wheel-banner');
        // wheel.enabled = показати/сховати банер (тумблер у хедері)
        // wheel.active  = активно/не активно (тумблер у колонці КОЛЕСО)
        if (!wheel.enabled) {
            banner.style.display = 'none';
        } else {
            banner.style.display = 'block';
            const isActive = wheel.active !== false; // default true
            if (isActive) {
                banner.classList.remove('inactive');
                const amt = Number(wheel.amount || 0);
                const dep = Number(wheel.min_dep || 0);
                const win = Number(wheel.winners || 0);
                document.getElementById('wb-title').innerText = '🎡 СТАТУС КОЛЕСА: АКТИВНО';
                document.getElementById('wb-val-amount').innerText = amt > 0 ? (formatNumberWithCommas(amt) + ' $') : '—';
                document.getElementById('wb-val-dep').innerText   = dep > 0 ? (formatNumberWithCommas(dep) + ' $') : '—';
                document.getElementById('wb-val-winners').innerText = win > 0 ? win + ' чел.' : '—';
            } else {
                banner.classList.add('inactive');
                document.getElementById('wb-title').innerText = '🎡 СТАТУС КОЛЕСА: НЕ АКТИВНО';
                document.getElementById('wb-val-amount').innerText = '—';
                document.getElementById('wb-val-dep').innerText = '—';
                document.getElementById('wb-val-winners').innerText = '—';
            }
        }
    });
    
    function checkMarquee() {
        requestAnimationFrame(function() {
            document.querySelectorAll('.slot-name-marquee, .b-name-marquee').forEach(function(wrap) {
                // clear any previous duplicate
                const dupe = wrap.querySelector('.marquee-dupe');
                if (dupe) dupe.remove();
                const el = wrap.querySelector('.slot-name, .b-name');
                if (!el) return;
                el.classList.remove('do-marquee');
                wrap.style.removeProperty('--scroll-dist');
                wrap.style.removeProperty('--marquee-dur');

                const textW = el.scrollWidth;
                const wrapW = wrap.offsetWidth;
                if (textW <= wrapW + 2) return; // fits — no scroll needed

                // gap between end of text and start of copy
                const gap = 4;
                const totalDist = textW + gap;
                const speed = 22; // px per second
                const dur = totalDist / speed;

                wrap.style.setProperty('--scroll-dist', '-' + totalDist + 'px');
                wrap.style.setProperty('--marquee-dur', dur + 's');

                // create duplicate that follows seamlessly
                const clone = el.cloneNode(true);
                clone.classList.add('marquee-dupe');
                clone.classList.add('do-marquee');
                clone.style.position = 'absolute';
                clone.style.top = '0';
                clone.style.left = textW + gap + 'px';
                clone.style.margin = '0';
                clone.style.lineHeight = window.getComputedStyle(el).lineHeight;
                clone.style.fontSize = window.getComputedStyle(el).fontSize;
                clone.style.fontWeight = window.getComputedStyle(el).fontWeight;
                clone.style.color = window.getComputedStyle(el).color;
                wrap.style.position = 'relative';
                wrap.appendChild(clone);

                el.classList.add('do-marquee');
            });
        });
    }
    function renderSoloMode(data) {
        const slots = data.slots ? Object.values(data.slots) : [];
        const activeIndex = data.active_index !== undefined ? data.active_index : 0;
        const displayMode = data.display_mode || 'hunt';
        const startBalance = data.start_balance ?? 0; const balanceCurr = data.start_balance_currency || '₽';
        const customIcons = data.custom_icons || {};
        let totalWin = 0; let totalBuy = 0; let openedCount = 0; let remainingBuy = 0; let openedTotalBuy = 0; let openedTotalWin = 0; let maxX = 0;
        slots.forEach(function(s, idx) {
            const buy = Number(s.buy || 0); const win = Number(s.win || 0); totalBuy += buy; totalWin += win;
            // В режимі hunt "відкрита" = є виграш (win > 0). В bonusbuy/finish — стара логіка
            const isOpened = displayMode === 'hunt'
                ? (win > 0)
                : (win > 0 || (win === 0 && idx < activeIndex));
            if (isOpened) { openedCount++; openedTotalBuy += buy; openedTotalWin += win; } else { remainingBuy += buy; }
            if (buy > 0 && win > 0 && (win/buy) > maxX) maxX = win/buy;
        });
        // === COMEBACK логіка ===
        // openedTotalWin — сума виграшів по відкритих слотах
        // totalBuy       — загальна сума всіх купів (весь депозит хант/ббай)
        // openedTotalBuy — сума купів по відкритих слотах
        // remainingBuy   — залишилось ще не відкрити

        let comebackXText;

        if (displayMode === 'hunt') {
            // ХАНТ: депозит = startBalance. Бонуски ловимо, кожна має свій buy.
            // Потрібний ікс = скільки мають дати НЕВІДКРИТІ бонуски щоб вийти в 0.
            // "Невідкриті" в ханті = ті де ще немає win (win === 0).
            // remainingBuy = сума buy слотів без виграшу (вже вираховується правильно).
            // Депозит = startBalance (не сума купів!).
            const deposit = Number(startBalance) || 0;
            if (slots.length === 0 || deposit === 0) {
                // нічого не додано або депозит не вказано — прочерк
                comebackXText = '—';
            } else if (openedTotalWin >= deposit) {
                comebackXText = 'ОКУП';
            } else if (remainingBuy === 0) {
                // всі бонуски мають виграш — але загальний виграш < депозиту
                comebackXText = openedTotalWin >= deposit ? 'ОКУП' : 'НЕ ОКУП';
            } else {
                // скільки ще треба виграти
                const needWin = deposit - openedTotalWin;
                const needX = needWin / remainingBuy;
                comebackXText = needX.toFixed(2) + 'x';
            }
        } else if (displayMode === 'bonusbuy') {
            // БОНУСБАЙ: депозит = startBalance (як у ханті).
            // Показуємо потрібний середній ікс по НЕВІДКРИТИХ (де ще немає win).
            const deposit = Number(startBalance) || 0;
            if (slots.length === 0 || deposit === 0) {
                comebackXText = '—';
            } else if (openedTotalWin >= deposit) {
                comebackXText = 'ОКУП';
            } else if (remainingBuy === 0) {
                comebackXText = openedTotalWin >= deposit ? 'ОКУП' : 'НЕ ОКУП';
            } else {
                const needWin = deposit - openedTotalWin;
                const needX = needWin / remainingBuy;
                comebackXText = needX.toFixed(2) + 'x';
            }
        } else {
            // finish — підсумкова логіка
            if (slots.length === 0) {
                comebackXText = '—';
            } else {
                comebackXText = totalBuy === 0 ? '—' : (totalWin >= totalBuy ? 'ОКУП' : 'НЕ ОКУП');
            }
        }

        const openedAvgX = openedTotalBuy > 0 ? (openedTotalWin / openedTotalBuy) : 0;
        document.getElementById('stat-total').innerText = formatNumberCompact(startBalance) + ' ' + balanceCurr;
        document.getElementById('stat-count').innerText = openedCount + '/' + slots.length;
        document.getElementById('stat-comeback').innerText = comebackXText; 
        document.getElementById('stat-avg-opened').innerText = openedAvgX.toFixed(2) + 'x'; 
        const container = document.getElementById('slots-container');
        document.getElementById('solo-container').className = 'tracker-container ' + (slots.length > 0 ? 'has-items ' : '') + 'mode-' + displayMode;
        let slotsToRender = slots.map((s,i)=>Object.assign({},s,{orig:i}));
        let listHTML = '';
        let focusIndex = (displayMode === 'hunt' && slotsToRender.length > 0) ? slotsToRender.length - 1 : activeIndex;
        slotsToRender.forEach(function(slot) {
            const isActive = slot.orig === focusIndex; 
            const slotCur = slot.currency || '₽'; const buy = Number(slot.buy || 0); const win = Number(slot.win || 0);
            let xValText = '—'; let multClass = 'mult-pending';
            if (win > 0 && buy > 0) { xValText = (win / buy).toFixed(2) + 'x'; multClass = (win / buy) >= 1 ? 'mult-win' : 'mult-loss'; } else if (win === 0 && slot.orig < activeIndex) { xValText = '0.00x'; multClass = 'mult-loss'; }
            let isCrown = (displayMode === 'finish' && win > 0 && buy > 0 && (win/buy) === maxX && maxX > 0);
            let iconInner = '?'; if (customIcons[slot.name]) iconInner = `<img class="slot-icon-img" src="${customIcons[slot.name]}" onerror="this.style.display='none'">`; else if (slot.name) iconInner = `<div class="slot-icon-text">${slot.name.substring(0, 2)}</div>`;
            const winDisplayHTML = win > 0 ? `<span class="arrow-blue">➔</span> <span style="color:#2ecc71;">${formatNumberWithCommas(win)} ${slotCur}</span>` : '';
            let showActiveEffects = isActive && displayMode !== 'finish';
            let rowExtra = '';
            if (isCrown) rowExtra = 'border: 1px solid rgba(255,183,3,0.45); background: rgba(255,183,3,0.07);';
            else if (showActiveEffects) rowExtra = 'border: 1px solid rgba(124, 58, 237, 0.4); box-shadow: 0 10px 30px rgba(124,58,237,0.15); transform: scale(1.02); z-index: 10;';
            listHTML += `
                <div class="slot-row" style="${rowExtra}">
                    <div class="slot-icon-wrapper">${iconInner}${isCrown ? '<div class="crown-overlay">👑</div>' : ''}</div>
                    <div class="slot-info">
                        <div class="slot-name-marquee" style="--scroll-dist: calc(-1 * (100% - 10px)); --marquee-dur: ${Math.max(12, slot.name.length * 0.55)}s"><span class="slot-name">${slot.name}</span></div>
                        <div class="slot-amounts"><span>${formatNumberWithCommas(buy)} ${slotCur}</span>${winDisplayHTML}</div>
                    </div>
                    <div class="multiplier-badge ${multClass}" style="margin-left:14px;">${xValText}</div>
                </div>`;
        });
        if (displayMode === 'bonusbuy' || displayMode === 'hunt') {
            container.innerHTML = listHTML; checkMarquee(); container.style.animation = 'none'; let itemHeight = 100; let totalItems = slotsToRender.length;
            if (focusIndex >= 2) { let listHeight = (totalItems * itemHeight) - 12; let maxScroll = Math.max(0, listHeight - 488); let targetY = Math.min(maxScroll, (focusIndex - 2) * itemHeight); container.style.transform = `translateY(-${targetY}px)`; } 
            else { container.style.transform = `translateY(0px)`; }
        } else if (displayMode === 'finish' && slotsToRender.length > 0) {
            container.style.transform = "none"; container.innerHTML = listHTML.repeat(6); checkMarquee();
            const timeToMove = slotsToRender.length * 3.5; container.style.animation = `infiniteWheel ${timeToMove * 3}s linear infinite`;
        } else { container.style.transform = "none"; container.style.animation = 'none'; container.innerHTML = listHTML; checkMarquee(); }
    }
    
    function renderBattleMode(bData, globalIcons) {
        let players = bData.players || [bData.p1_name || 'Игрок 1', bData.p2_name || 'Игрок 2'];
        let requiredWidth = Math.max(580, players.length * 280); 
        document.getElementById('battle-container').style.width = requiredWidth + 'px';
        let rawRounds = bData.rounds ? Object.values(bData.rounds) : [];
        let rounds = rawRounds.map((r, i) => { let rr = (!r.p) ? { p: [r.p1 || {name:'',buy:0,win:0}, r.p2 || {name:'',buy:0,win:0}] } : r; rr.orig = i; return rr; });
        const activeIndex = bData.active_index !== undefined ? bData.active_index : 0;
        const displayMode = bData.display_mode || 'hunt';
        const curr = bData.currency || '₽'; const sharedBalance = bData.start_balance || 0;
        const bonusXEnabled = bData.bonus_x_enabled === true;
        let globalBestX = 0; let globalBestRound = -1; let globalBestPlayer = -1;
        rounds.forEach((r, rIdx) => {
            r.p.forEach((p, pIdx) => {
                let b = Number(p.buy || 0); let w = Number(p.win || 0);
                if (b > 0 && w > 0) { let x = w / b; if (x > globalBestX) { globalBestX = x; globalBestRound = rIdx; globalBestPlayer = pIdx; } }
            });
        });
        let playersStats = Array(players.length).fill().map(()=>({ opened_buy: 0, opened_win: 0, score: 0 }));
        let openedTotalBuyAll = 0, openedTotalWinAll = 0, openedCount = 0;
        rounds.forEach((r, idx) => {
            let isRoundOpened = idx < activeIndex;
            r.p.forEach(p => { if (Number(p.win || 0) > 0) isRoundOpened = true; });
            if (isRoundOpened) {
                let round_max_x = 0; let round_xs = [];
                r.p.forEach((p, i) => {
                    let b = Number(p.buy || 0); let w = Number(p.win || 0);
                    if(playersStats[i]) { playersStats[i].opened_buy += b; playersStats[i].opened_win += w; }
                    openedTotalBuyAll += b; openedTotalWinAll += w;
                    let x = b > 0 ? w/b : 0; round_xs.push(x);
                    if (x > round_max_x) round_max_x = x;
                });
                if (round_max_x > 0) { round_xs.forEach((x, i) => { if (x === round_max_x && playersStats[i]) playersStats[i].score += 1; }); }
                openedCount++;
            }
        });
        if (bonusXEnabled && globalBestPlayer >= 0 && globalBestRound < activeIndex) {
            let bestRound = rounds[globalBestRound]; let isOpened = globalBestRound < activeIndex;
            if (!isOpened && bestRound) { bestRound.p.forEach(p => { if (Number(p.win || 0) > 0) isOpened = true; }); }
            if (isOpened && playersStats[globalBestPlayer]) { playersStats[globalBestPlayer].score += 1; }
        }
        let maxScore = -1;
        if (displayMode === 'finish') { playersStats.forEach(ps => { if (ps.score > maxScore) maxScore = ps.score; }); }
        let headerHTML = '';
        players.forEach((pName, i) => {
            let avgX = playersStats[i].opened_buy > 0 ? (playersStats[i].opened_win / playersStats[i].opened_buy) : 0;
            let isHighestScore = (displayMode === 'finish' && playersStats[i].score === maxScore && maxScore > 0);
            headerHTML += `<div class="battle-player-block ${isHighestScore ? 'winner-block' : ''}"><div class="b-name-wrap"><span class="b-crown-diagonal">👑</span><span class="b-name">${pName}</span></div><span class="b-meta">Средний: ${avgX.toFixed(2)}x</span><div class="b-score-box">${playersStats[i].score}</div></div>`;
            if (i < players.length - 1) headerHTML += `<div style="font-weight:900; color:#444; font-size: 20px; align-self: center; padding-top: 10px;">VS</div>`;
        });
        document.getElementById('battle-header').innerHTML = headerHTML; checkMarquee();
        const sharedAvgX = openedTotalBuyAll > 0 ? (openedTotalWinAll / openedTotalBuyAll) : 0;
        document.getElementById('b-stat-shared-depo').innerText = formatNumberCompact(sharedBalance) + ' ' + curr;
        document.getElementById('b-stat-shared-comeback').innerText = sharedAvgX.toFixed(2) + 'x';
        document.getElementById('b-stat-shared-count').innerText = openedCount + '/' + rounds.length;
        const container = document.getElementById('battle-slots-container');
        let listHTML = '';
        let focusIndex = (displayMode === 'hunt' && rounds.length > 0) ? rounds.length - 1 : activeIndex;
        rounds.forEach((r) => {
            let isScored = r.orig < activeIndex; r.p.forEach(p => { if (Number(p.win || 0) > 0) isScored = true; });
            let showActiveEffects = r.orig === focusIndex && displayMode !== 'finish';
            let max_x = 0; r.p.forEach(p => { let x = Number(p.buy||0) > 0 ? Number(p.win||0) / Number(p.buy||0) : 0; if(x > max_x) max_x = x; });
            let playersRowHTML = '';
            r.p.forEach((p, i) => {
                let buy = Number(p.buy||0); let win = Number(p.win||0); let x = buy > 0 ? win/buy : 0;
                let isWinner = (isScored && x === max_x && max_x > 0);
                let isGlobalBestX = bonusXEnabled && displayMode === 'finish' && (r.orig === globalBestRound) && (i === globalBestPlayer) && globalBestX > 0;
                let tx = win > 0 ? x.toFixed(2) + 'x' : (isScored ? '0.00x' : '—');
                let mc = win > 0 && x >= 1 ? 'mult-win' : (isScored ? 'mult-loss' : 'mult-pending');
                let wDisplay = win > 0 ? `<span class="arrow-blue">➔</span> <span style="color:#2ecc71;">${formatNumberWithCommas(win)} ${curr}</span>` : '';
                let icn = globalIcons[p.name] ? `<img class="slot-icon-img" src="${globalIcons[p.name]}" onerror="this.style.display='none'">` : `<div class="slot-icon-text" style="font-size: 14px;">${(p.name || '?').substring(0, 2)}</div>`;
                let sideClass = 'b-side'; if (isGlobalBestX) sideClass += ' best-x-winner'; else if (isWinner) sideClass += ' winner';
                playersRowHTML += `<div class="${sideClass}"><div class="slot-icon-wrapper">${icn}</div><div class="slot-info"><div class="slot-name-row"><div class="slot-name-marquee" style="--scroll-dist: calc(-1 * (100% - 10px)); --marquee-dur: ${Math.max(12, (p.name||'Слот').length * 0.55)}s"><span class="slot-name">${p.name || 'Слот'}</span></div><div class="multiplier-badge ${mc}">${tx}${isGlobalBestX ? ' ⭐' : ''}</div></div><div class="slot-amounts"><span>${formatNumberWithCommas(buy)} ${curr}</span>${wDisplay}</div></div></div>`;
                if (i < r.p.length - 1) playersRowHTML += `<div class="b-vs-text">VS</div>`;
            });
            listHTML += `<div class="battle-row" style="transform: scale(${showActiveEffects ? '1.02' : '1'}); ${showActiveEffects ? 'border: 1px solid rgba(124, 58, 237, 0.4); box-shadow: 0 10px 30px rgba(124,58,237,0.15); z-index: 10;' : ''}">${playersRowHTML}</div>`;
        });
        if (displayMode === 'bonusbuy' || displayMode === 'hunt') {
            container.innerHTML = listHTML; checkMarquee(); container.style.animation = 'none'; let itemHeight = 100; let totalItems = rounds.length;
            if (focusIndex >= 2) { let listHeight = (totalItems * itemHeight) - 12; let maxScroll = Math.max(0, listHeight - 488); let targetY = Math.min(maxScroll, (focusIndex - 2) * itemHeight); container.style.transform = `translateY(-${targetY}px)`; }
            else { container.style.transform = `translateY(0px)`; }
        } else if (displayMode === 'finish' && rounds.length > 0) {
            container.style.transform = "none"; container.innerHTML = listHTML.repeat(6); checkMarquee();
            const timeToMove = rounds.length * 3.5; container.style.animation = `infiniteWheel ${timeToMove * 3}s linear infinite`;
        } else { container.style.transform = "none"; container.style.animation = 'none'; container.innerHTML = listHTML; checkMarquee(); }
    }
</script>
